<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Noticias · Banco Guayaquil</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===================== BANCO GUAYAQUIL DESIGN SYSTEM ===================== */
:root{
  /* Brand Colors */
  --bg-magenta:#E2007A;
  --bg-magenta-dark:#B5005F;
  --bg-magenta-light:#FCE8F3;
  --bg-magenta-mid:#f0428f;
  --bg-dark:#1A0A12;
  --bg-dark2:#2D0D1E;
  --bg-dark3:#3D1228;

  /* Neutrals */
  --blanco:#FFFFFF;
  --gris1:#FAF9FA;
  --gris2:#F3F0F2;
  --gris3:#E8E3E6;
  --gris4:#CFC8CC;
  --gris5:#9A8F94;
  --gris6:#6B6068;
  --negro:#1A0A12;

  /* Semantic */
  --rojo:#C0392B;--rojo-claro:#FEF0EE;--rojo-borde:#F5C0BA;
  --ambar:#B7600A;--ambar-claro:#FEF6EC;--ambar-borde:#F5D5A8;
  --verde:#1A7A3C;--verde-claro:#EDF7F2;--verde-borde:#A8DCC0;
  --naranja:#C96A00;
  --azul:#1A4A7A;--azul-claro:#EEF4FD;--azul-borde:#B0CCF0;

  /* UI */
  --borde:#E8E3E6;
  --radio:10px;
  --radio-pill:24px;
  --radio-lg:14px;
  --sombra:0 1px 3px rgba(226,0,122,0.06),0 1px 2px rgba(0,0,0,0.04);
  --sombra-lg:0 4px 20px rgba(226,0,122,0.12),0 2px 8px rgba(0,0,0,0.06);
  --sombra-card:0 2px 8px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Montserrat",sans-serif;background:var(--gris1);color:var(--negro);min-height:100vh;overflow-x:hidden}

/* ===================== LOGIN ===================== */
.login-overlay{position:fixed;inset:0;background:#F5F5F5;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.login-overlay.hidden{display:none}
.login-wrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:460px}
.login-logo-wrap{text-align:center;margin-bottom:2rem}
.login-logo svg{display:block}
.login-tagline{font-size:11px;letter-spacing:0.06em;color:var(--gris5);margin-top:6px;font-weight:500}
.login-box{background:#fff;border-radius:16px;padding:2.5rem 2.25rem;width:100%;box-shadow:0 2px 24px rgba(0,0,0,0.10)}
.login-divider{display:none}
.login-title{font-size:22px;font-weight:800;color:#1A1A1A;margin-bottom:1.75rem;text-align:left;letter-spacing:-0.01em}
.login-sub{display:none}
.login-field{margin-bottom:1.1rem}
.login-field label{display:block;font-size:13px;color:#1A1A1A;margin-bottom:8px;font-weight:500}
.login-field input{width:100%;font-family:"Montserrat",sans-serif;font-size:15px;padding:14px 16px;border-radius:10px;border:1.5px solid #C8C8C8;background:#fff;color:#1A1A1A;outline:none;transition:border-color .15s;font-weight:400}
.login-field input::placeholder{color:#AAAAAA}
.login-field input:focus{border-color:#1A1A1A}
.login-error{font-size:12px;color:var(--rojo);margin-bottom:10px;min-height:16px;text-align:left;font-weight:600}
.login-btn{width:100%;font-family:"Montserrat",sans-serif;font-size:15px;font-weight:700;padding:15px;border-radius:10px;border:none;background:var(--bg-magenta);color:#fff;cursor:pointer;transition:background .15s;margin-top:8px}
.login-btn:hover{background:var(--bg-magenta-dark)}

/* ===================== HEADER ===================== */
header{background:var(--bg-magenta);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.logo-img svg{display:block}
.header-center{font-size:13px;color:#fff;letter-spacing:0.04em;text-transform:none;font-weight:700}
.header-right{display:flex;align-items:center;gap:10px}
.sel-indicator{font-size:12px;color:rgba(255,255,255,0.85);display:none;font-weight:500}
.sel-indicator.visible{display:block}
.sel-indicator span{color:var(--bg-magenta);font-weight:700}
.btn-pdf{background:#fff;color:var(--bg-magenta);border:none;border-radius:var(--radio-pill);padding:7px 18px;font-size:11px;font-family:"Montserrat",sans-serif;font-weight:700;cursor:pointer;display:none;transition:all .15s;letter-spacing:0.04em;text-transform:uppercase}
.btn-pdf.visible{display:block}
.btn-pdf:hover{opacity:0.9}
.btn-logout{background:rgba(255,255,255,0.15);color:#fff;border:1.5px solid rgba(255,255,255,0.4);border-radius:var(--radio-pill);padding:6px 14px;font-size:10px;font-family:"Montserrat",sans-serif;cursor:pointer;transition:all .15s;letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
.btn-logout:hover{background:rgba(255,255,255,0.25);border-color:#fff}

/* ===================== MAIN LAYOUT ===================== */
.main{display:grid;grid-template-columns:264px 1fr;min-height:calc(100vh - 58px);min-width:0}

/* ===================== SIDEBAR ===================== */
.sidebar{background:var(--blanco);border-right:1px solid var(--borde);padding:1.25rem 1rem;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;overflow-x:visible;flex-shrink:0;transition:top .2s,height .2s}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--bg-magenta-light);border-radius:2px}
.sidebar-section{margin-bottom:1.1rem}
.sidebar-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--bg-magenta);margin-bottom:7px;display:block}
.sidebar-divider{border:none;border-top:1px solid var(--borde);margin:.9rem 0}

/* Search */
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gris5);font-size:12px;pointer-events:none}
.search-input{width:100%;font-family:"Montserrat",sans-serif;font-size:12px;padding:8px 10px 8px 30px;border-radius:var(--radio);border:1.5px solid var(--borde);background:var(--gris1);color:var(--negro);outline:none;transition:all .12s;font-weight:400}
.search-input:focus{border-color:var(--bg-magenta);background:var(--blanco);box-shadow:0 0 0 3px var(--bg-magenta-light)}
.search-input::placeholder{color:var(--gris5)}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gris5);font-size:15px;display:none;line-height:1;padding:2px}
.search-clear.visible{display:block}

/* Date range */
.date-range{display:flex;flex-direction:column;gap:5px}
.date-range-row{display:flex;align-items:center;gap:6px}
.date-range-row label{font-size:9px;color:var(--gris5);width:32px;flex-shrink:0;font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.date-range-row input[type="date"]{flex:1;font-family:"Montserrat",sans-serif;font-size:11px;padding:6px 8px;border-radius:var(--radio);border:1.5px solid var(--borde);background:var(--gris1);color:var(--negro);outline:none;cursor:pointer;transition:all .12s;font-weight:500;color-scheme:light}
.date-range-row input[type="date"]:focus{border-color:var(--bg-magenta);box-shadow:0 0 0 3px var(--bg-magenta-light)}
.date-range-row input[type="date"].activo{background:var(--bg-magenta);border-color:var(--bg-magenta);color:#fff;color-scheme:light}
.date-range-row input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:0.6;filter:none}
.date-range-row input[type="date"].activo::-webkit-calendar-picker-indicator{filter:brightness(0) invert(1);opacity:0.8}
.date-week-hint{font-size:9px;color:var(--gris5);margin-top:3px;font-weight:500}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:10px;padding:4px 11px;border-radius:var(--radio-pill);border:1.5px solid var(--borde);background:var(--gris1);color:var(--gris6);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:"Montserrat",sans-serif;font-weight:600;letter-spacing:0.02em}
.chip:hover:not(.disabled){border-color:var(--bg-magenta);color:var(--bg-magenta)}
.chip.disabled{opacity:0.28;cursor:default;pointer-events:none}
.chip.on-todos{background:var(--bg-magenta);color:#fff;border-color:var(--bg-magenta)}
.chip.on-alto{background:var(--rojo-claro);color:var(--rojo);border-color:var(--rojo-borde)}
.chip.on-medio{background:var(--gris2);color:var(--gris6);border-color:var(--gris4)}
.chip.on-bajo{background:var(--gris2);color:var(--gris6);border-color:var(--gris4)}
.chip.on-prio{background:var(--bg-magenta-light);color:var(--bg-magenta);border-color:#F0A0C8}

/* DROPDOWN */
.dropdown-wrap{position:relative}
.dropdown-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:var(--radio);border:1.5px solid var(--borde);background:var(--gris1);cursor:pointer;transition:all .12s;user-select:none;font-family:"Montserrat",sans-serif}
.dropdown-trigger:hover{border-color:var(--bg-magenta-light)}
.dropdown-trigger.open{border-color:var(--bg-magenta);background:var(--blanco);box-shadow:0 0 0 3px var(--bg-magenta-light)}
.dropdown-trigger.has-value{border-color:var(--bg-magenta);background:var(--bg-magenta);color:#fff}
.dropdown-trigger.has-value .dropdown-arrow{color:#fff}
.dropdown-label{font-size:11px;color:var(--gris6);font-weight:500;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dropdown-trigger.has-value .dropdown-label{color:#fff}
.dropdown-badge{font-size:10px;background:rgba(255,255,255,0.25);color:#fff;border-radius:20px;padding:1px 7px;margin-right:6px;font-weight:700;flex-shrink:0}
.dropdown-arrow{color:var(--gris5);font-size:9px;transition:transform .15s;flex-shrink:0;margin-left:4px}
.dropdown-trigger.open .dropdown-arrow{transform:rotate(180deg)}
.dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--blanco);border:1.5px solid var(--bg-magenta-light);border-radius:var(--radio);box-shadow:var(--sombra-lg);z-index:200;overflow:hidden;display:none}
.dropdown-menu.open{display:block}
.dropdown-search{padding:8px;border-bottom:1px solid var(--borde)}
.dropdown-search input{width:100%;font-family:"Montserrat",sans-serif;font-size:11px;padding:6px 10px;border-radius:8px;border:1.5px solid var(--borde);background:var(--gris1);color:var(--negro);outline:none;font-weight:400}
.dropdown-search input:focus{border-color:var(--bg-magenta)}
.dropdown-search input::placeholder{color:var(--gris5)}
.dropdown-list{max-height:190px;overflow-y:auto}
.dropdown-list::-webkit-scrollbar{width:3px}.dropdown-list::-webkit-scrollbar-thumb{background:var(--bg-magenta-light)}
.dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;transition:background .08s;font-size:11px;color:var(--negro);font-weight:400}
.dropdown-item:hover{background:var(--bg-magenta-light)}
.dropdown-item.selected{background:var(--bg-magenta-light);font-weight:600;color:var(--bg-magenta)}
.dropdown-item.selected::after{content:"✓";font-size:11px;color:var(--bg-magenta);font-weight:700}
.dropdown-item.disabled-item{color:var(--gris4);cursor:default;pointer-events:none}
.dropdown-item .item-count{font-size:9px;color:var(--gris5);background:var(--gris2);border-radius:20px;padding:1px 6px;flex-shrink:0;font-weight:600}
.dropdown-all{padding:8px 12px;font-size:11px;color:var(--gris6);cursor:pointer;border-bottom:1px solid var(--borde);transition:background .08s;font-weight:600}
.dropdown-all:hover{background:var(--bg-magenta-light)}
.dropdown-all.selected{background:var(--bg-magenta);color:#fff}
.dropdown-empty{padding:12px;text-align:center;font-size:11px;color:var(--gris5)}

.reset-btn{width:100%;font-size:10px;padding:8px;border-radius:var(--radio-pill);border:1.5px solid var(--bg-magenta-light);background:transparent;color:var(--bg-magenta);cursor:pointer;font-family:"Montserrat",sans-serif;margin-top:.75rem;transition:all .12s;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.reset-btn:hover{background:var(--bg-magenta);color:#fff;border-color:var(--bg-magenta)}

/* ===================== VIEW TOGGLE ===================== */
.view-toggle{display:flex;gap:3px;background:var(--gris2);border-radius:var(--radio-pill);padding:3px}
.view-btn{font-size:10px;padding:5px 12px;border-radius:var(--radio-pill);border:none;background:transparent;color:var(--gris5);cursor:pointer;font-family:"Montserrat",sans-serif;font-weight:700;transition:all .12s;display:flex;align-items:center;gap:4px;letter-spacing:0.04em;text-transform:uppercase}
.view-btn.active{background:var(--bg-magenta);color:#fff;box-shadow:0 2px 8px rgba(226,0,122,0.3)}
.view-btn:hover:not(.active){color:var(--bg-magenta)}

/* ===================== CONTENT ===================== */
.content{padding:1.5rem 2rem;background:var(--gris1);min-width:0;overflow:hidden}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{border-radius:var(--radio-lg);padding:14px 16px;border:1px solid var(--borde);background:var(--blanco);box-shadow:var(--sombra-card);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.stat-alto::before{background:var(--rojo)}
.stat-medio::before{background:var(--gris4)}
.stat-bajo::before{background:var(--gris5)}
.stat-prio::before{background:var(--bg-magenta)}
.stat-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;color:var(--gris5)}
.stat-num{font-size:28px;font-weight:800;color:var(--negro);letter-spacing:-0.02em}

/* ACTIVE FILTERS */
.active-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;align-items:center}
.af-label{font-size:10px;color:var(--gris5);font-weight:600}
.af-tag{font-size:10px;padding:3px 10px;border-radius:var(--radio-pill);background:var(--bg-magenta);border:1px solid var(--bg-magenta);color:#fff;display:flex;align-items:center;gap:5px;font-weight:600}
.af-tag button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.6);font-size:14px;line-height:1;padding:0}
.af-tag button:hover{color:#fff}
.af-clear{font-size:10px;color:var(--bg-magenta);cursor:pointer;text-decoration:underline;font-weight:600}

/* RESULTS BAR */
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.results-count{font-size:12px;color:var(--gris5);font-weight:500}
.results-count strong{color:var(--negro);font-weight:700}

/* ===================== LIST VIEW CARDS ===================== */
.news-card{background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--radio-lg);padding:1rem 1.25rem;margin-bottom:8px;cursor:pointer;transition:all .12s;box-shadow:var(--sombra-card)}
.news-card:hover{border-color:var(--bg-magenta-light);box-shadow:var(--sombra-lg);transform:translateY(-1px)}
.news-card.selected{border-color:var(--bg-magenta);box-shadow:0 0 0 2px var(--bg-magenta-light)}
.news-card.prioritario{border-left:3px solid var(--bg-magenta)}
.card-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.card-chk{width:17px;height:17px;border:2px solid var(--gris4);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .12s}
.card-chk.on{background:var(--bg-magenta);border-color:var(--bg-magenta)}
.card-chk.on::after{content:"";width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.card-header{flex:1}
.card-title{font-size:14px;font-weight:700;color:var(--negro);line-height:1.4;margin-bottom:4px}
.card-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.card-date,.card-fuente{font-size:11px;color:var(--gris5);font-weight:500}
.card-sep{font-size:11px;color:var(--gris4)}
.prio-badge{font-size:9px;font-weight:700;padding:2px 9px;border-radius:var(--radio-pill);background:var(--bg-magenta);color:#fff;flex-shrink:0;letter-spacing:0.06em;text-transform:uppercase}
.card-desc{font-size:13px;color:var(--gris6);line-height:1.65;padding-left:27px;margin-bottom:10px;font-weight:400}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;padding-left:27px;align-items:center}
.badge{font-size:10px;padding:3px 10px;border-radius:var(--radio-pill);font-weight:600;display:inline-block;white-space:nowrap}
.b-alto{background:#FEEAEA;color:#B0001E;border:1px solid #F5C0C0}
.b-medio{background:var(--gris2);color:var(--gris6);border:1px solid var(--gris3)}
.b-bajo{background:var(--gris1);color:var(--gris5);border:1px solid var(--gris3)}
.b-tag{background:var(--gris2);color:var(--gris6);border:1px solid var(--borde)}
.b-doc{background:var(--azul-claro);color:var(--azul);border:1px solid var(--azul-borde);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all .12s}
.b-doc:hover{background:#daeafe}

/* ===================== KANBAN VIEW ===================== */
.kanban-view{display:none}
.kanban-view.active{display:flex;gap:12px;overflow-x:auto;padding-bottom:1rem;align-items:flex-start;width:100%;box-sizing:border-box}
.kanban-view::-webkit-scrollbar{height:5px}.kanban-view::-webkit-scrollbar-track{background:var(--gris2);border-radius:3px}.kanban-view::-webkit-scrollbar-thumb{background:var(--bg-magenta-light);border-radius:3px}
.kanban-col{flex:0 0 300px;background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--radio-lg);overflow:hidden;box-shadow:var(--sombra-card)}
.kanban-col-header{padding:11px 14px;border-bottom:1px solid var(--borde);display:flex;align-items:center;justify-content:space-between;background:var(--gris1)}
.kanban-col-title{font-size:11px;font-weight:800;color:var(--negro);letter-spacing:0.02em;text-transform:uppercase}
.kanban-col-count{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff;letter-spacing:0.04em;background:var(--gris6)}
.kanban-cards{padding:10px;display:flex;flex-direction:column;gap:7px;max-height:calc(100vh - 210px);overflow-y:auto}
.kanban-cards::-webkit-scrollbar{width:3px}.kanban-cards::-webkit-scrollbar-thumb{background:var(--bg-magenta-light)}

/* K-CARD with accordion */
.k-card{background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--radio);box-shadow:var(--sombra-card);overflow:hidden;transition:all .12s}
.k-card:hover{border-color:var(--bg-magenta-light);box-shadow:var(--sombra-lg)}
.k-card.selected{border-color:var(--bg-magenta);box-shadow:0 0 0 2px var(--bg-magenta-light)}
.k-card.prioritario{border-left:3px solid var(--bg-magenta)}
.k-card-summary{padding:10px 10px 8px;cursor:pointer}
.k-card-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;width:100%}
.k-card-chk{width:14px;height:14px;border:2px solid var(--gris4);border-radius:4px;flex-shrink:0;margin-top:2px;transition:all .12s;display:flex;align-items:center;justify-content:center}
.k-card-chk.on{background:var(--bg-magenta);border-color:var(--bg-magenta)}
.k-card-chk.on::after{content:"";width:7px;height:3.5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.k-card-title{font-size:11px;font-weight:700;color:var(--negro);line-height:1.4;flex:1;word-break:break-word;min-width:0}
.k-card-meta{font-size:9px;color:var(--gris5);margin-bottom:5px;font-weight:500}
.k-card-desc-preview{font-size:10px;color:var(--gris6);line-height:1.55;margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:400}
.k-card-footer{display:flex;align-items:center;justify-content:space-between}
.k-card-badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center;flex:1}
.k-card-badges .badge{font-size:9px;padding:2px 7px}
.k-accordion-btn{background:none;border:1.5px solid var(--borde);border-radius:var(--radio-pill);cursor:pointer;font-size:9px;color:var(--gris5);display:flex;align-items:center;gap:3px;padding:2px 8px;flex-shrink:0;transition:all .12s;font-family:"Montserrat",sans-serif;font-weight:700;letter-spacing:0.04em}
.k-accordion-btn:hover{border-color:var(--bg-magenta);color:var(--bg-magenta)}
.k-accordion-btn.open{border-color:var(--bg-magenta);color:var(--bg-magenta);background:var(--bg-magenta-light)}
.k-card-expanded{display:none;padding:0 10px 10px;border-top:1px solid var(--borde);margin-top:0}
.k-card-expanded.open{display:block}
.k-card-full-desc{font-size:11px;color:var(--gris6);line-height:1.65;padding-top:8px;font-weight:400}
.k-card-actions{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--borde)}

.k-empty{padding:20px;text-align:center;font-size:11px;color:var(--gris5)}

/* ===================== STATS VIEW ===================== */
.stats-view{display:none}
.stats-view.active{display:block}
.sv-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.sv-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.sv-panel{background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--radio-lg);padding:1.25rem 1.5rem;box-shadow:var(--sombra-card)}
.sv-panel.full{grid-column:1/-1}
.sv-panel-title{font-size:9px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--bg-magenta);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.sv-panel-title::after{content:"";flex:1;height:1px;background:var(--bg-magenta-light)}

/* KPI Row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.25rem}
.kpi-card{background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--radio-lg);padding:1rem 1.25rem;box-shadow:var(--sombra-card);position:relative;overflow:hidden;text-align:center}
.kpi-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--bg-magenta)}
.kpi-num{font-size:32px;font-weight:800;color:var(--negro);letter-spacing:-0.03em;line-height:1}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--gris5);margin-top:4px}
.kpi-sub{font-size:10px;color:var(--bg-magenta);font-weight:600;margin-top:2px}

/* Horizontal Bar Chart */
.hbar-list{display:flex;flex-direction:column;gap:8px}
.hbar-row{display:flex;align-items:center;gap:8px}
.hbar-label{font-size:10px;color:var(--negro);font-weight:600;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{flex:1;background:var(--gris2);border-radius:20px;height:8px;overflow:hidden}
.hbar-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.hbar-val{font-size:10px;font-weight:700;color:var(--negro);width:24px;text-align:right;flex-shrink:0}
.hbar-pct{font-size:9px;color:var(--gris5);width:28px;text-align:right;flex-shrink:0;font-weight:600}

/* Donut SVG */
.donut-wrap-lg{display:flex;align-items:center;gap:1.5rem;justify-content:center}
.donut-legend-lg{display:flex;flex-direction:column;gap:10px}
.donut-leg-item-lg{display:flex;align-items:center;gap:8px}
.donut-leg-dot-lg{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.donut-leg-label{font-size:11px;color:var(--negro);font-weight:600;flex:1}
.donut-leg-val{font-size:11px;color:var(--gris5);font-weight:700}
.donut-leg-pct{font-size:10px;color:var(--gris5);font-weight:500;width:30px;text-align:right}

/* Trend sparkline */
.trend-wrap{width:100%}
.trend-svg-wrap{width:100%;overflow:hidden}

/* Stacked bar impacto x factor */
.sb-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sb-label{font-size:9px;color:var(--negro);font-weight:700;width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.02em;text-transform:uppercase}
.sb-track{flex:1;display:flex;border-radius:20px;overflow:hidden;height:16px}
.sb-seg{height:100%;transition:width .5s;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;overflow:hidden}
.sb-val{font-size:9px;color:var(--gris5);width:20px;text-align:right;font-weight:600}

/* Dashboard skeleton */
.dash-skeleton{display:flex;flex-direction:column;gap:5px}
.skel-row{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--gris2) 25%,var(--gris3) 50%,var(--gris2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}
.skel-row.w100{width:100%}.skel-row.w80{width:80%}.skel-row.w60{width:60%}.skel-row.w40{width:40%}.skel-row.w70{width:70%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Misc */
.list-view{display:none}
.list-view.active{display:block}
.loading,.empty{text-align:center;padding:4rem 2rem;color:var(--gris5);font-size:13px;font-weight:500}
.spinner{width:28px;height:28px;border:2px solid var(--bg-magenta-light);border-top-color:var(--bg-magenta);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,10,18,0.6);z-index:300;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--blanco);border:1.5px solid var(--borde);border-radius:var(--radio-lg);padding:2rem;width:100%;max-width:440px;box-shadow:var(--sombra-lg)}
.modal h3{font-size:18px;font-weight:800;color:var(--negro);margin-bottom:4px}
.modal p{font-size:12px;color:var(--gris6);margin-bottom:1.25rem;font-weight:400}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:9px;color:var(--gris5);margin-bottom:5px;letter-spacing:0.1em;text-transform:uppercase;font-weight:700}
.modal-field input{width:100%;font-family:"Montserrat",sans-serif;font-size:13px;padding:9px 12px;border-radius:var(--radio);border:1.5px solid var(--borde);background:var(--gris1);color:var(--negro);outline:none;font-weight:400}
.modal-field input:focus{border-color:var(--bg-magenta);box-shadow:0 0 0 3px var(--bg-magenta-light)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{font-size:12px;padding:8px 18px;border-radius:var(--radio-pill);border:1.5px solid var(--borde);background:transparent;cursor:pointer;color:var(--gris6);font-family:"Montserrat",sans-serif;font-weight:600}
.btn-cancel:hover{border-color:var(--bg-magenta);color:var(--bg-magenta)}
.btn-generar{font-size:12px;padding:8px 22px;border-radius:var(--radio-pill);border:none;background:linear-gradient(135deg,var(--bg-magenta),var(--bg-magenta-dark));color:#fff;cursor:pointer;font-family:"Montserrat",sans-serif;font-weight:700;letter-spacing:0.04em}
.btn-generar:hover{box-shadow:0 4px 14px rgba(226,0,122,0.4)}.btn-generar:disabled{opacity:.35;cursor:not-allowed}
.modal-status{font-size:11px;color:var(--gris5);margin-top:8px;min-height:18px;font-weight:500}

.notif{position:fixed;bottom:1.5rem;right:1.5rem;font-size:12px;padding:10px 18px;border-radius:var(--radio-pill);z-index:400;display:none;box-shadow:var(--sombra-lg);font-weight:600}
.notif.ok{background:var(--bg-magenta-light);color:var(--bg-magenta-dark);border:1px solid #F0A0C8;display:block}
.notif.err{background:var(--rojo-claro);color:var(--rojo);border:1px solid var(--rojo-borde);display:block}

@media(max-width:768px){.main{grid-template-columns:1fr}.sidebar{position:relative;top:0;height:auto}.stats{grid-template-columns:repeat(2,1fr)}.content{padding:1rem}.kpi-row{grid-template-columns:1fr 1fr}.sv-grid,.sv-grid-3{grid-template-columns:1fr}}
</style>
</head>

// ==================== DATE HELPERS ====================
function toISODate(d){return d.toISOString().slice(0,10);}
function getMonthRange(){
  const today=new Date();
  const from=new Date(today.getFullYear(),today.getMonth(),1);
  const to=new Date(today.getFullYear(),today.getMonth()+1,0);
  return{desde:toISODate(from),hasta:toISODate(to)};
}
function setMonthDefault(){
  const{desde,hasta}=getMonthRange();
  filtros.desde=desde;filtros.hasta=hasta;
  document.getElementById("fDesde").value=desde;
  document.getElementById("fHasta").value=hasta;
  document.getElementById("fDesde").classList.add("activo");
  document.getElementById("fHasta").classList.add("activo");
  updateHint(desde,hasta);
}
function updateHint(desde,hasta){
  const d1=new Date(desde+"T00:00:00"),d2=new Date(hasta+"T00:00:00");
  const fmt=d=>d.getDate()+" "+MESES[d.getMonth()].slice(0,3);
  document.getElementById("weekHint").textContent="Mes en curso: "+fmt(d1)+" – "+fmt(d2);
}
function setFechaRango(){
  const d=document.getElementById("fDesde").value,h=document.getElementById("fHasta").value;
  filtros.desde=d||null;filtros.hasta=h||null;
  document.getElementById("fDesde").classList.toggle("activo",!!d);
  document.getElementById("fHasta").classList.toggle("activo",!!h);
  if(d&&h)updateHint(d,h);else document.getElementById("weekHint").textContent="";
  renderTodo();
}

// ==================== SEARCH ====================
function onSearch(){
  const q=document.getElementById("searchInput").value;
  filtros.q=q.trim().toLowerCase();

  renderTodo();
}
function clearSearch(){document.getElementById("searchInput").value="";filtros.q="";document.getElementById("searchClear").classList.remove("visible");renderTodo();}

// ==================== DROPDOWNS ====================
document.addEventListener("click",e=>{if(openDropdown&&!document.getElementById("wrap-"+openDropdown).contains(e.target))closeDropdown(openDropdown);});
function toggleDropdown(name){
  if(openDropdown&&openDropdown!==name)closeDropdown(openDropdown);
  const menu=document.getElementById("menu-"+name),trigger=document.getElementById("trigger-"+name);
  const isOpen=menu.classList.contains("open");
  if(isOpen)closeDropdown(name);
  else{menu.classList.add("open");trigger.classList.add("open");openDropdown=name;const s=document.getElementById("search-"+name);if(s){s.value="";s.focus();filterDropdown(name);}}
}
function closeDropdown(name){document.getElementById("menu-"+name).classList.remove("open");document.getElementById("trigger-"+name).classList.remove("open");if(openDropdown===name)openDropdown=null;}
function selectDropdown(name,val){filtros[name]=val;closeDropdown(name);renderTodo();}
function filterDropdown(name){const q=document.getElementById("search-"+name).value.toLowerCase();document.getElementById("list-"+name).querySelectorAll(".dropdown-item").forEach(el=>{el.style.display=el.dataset.val.toLowerCase().includes(q)?"":"none";});}

// ==================== LOAD ====================
async function cargarNoticias(){
  document.getElementById("newsGrid").innerHTML="<div class=\"loading\"><div class=\"spinner\"></div>Cargando noticias...</div>";
  try{
    const res=await fetch("/.netlify/functions/notion");
    if(!res.ok)throw new Error("HTTP "+res.status);
    noticias=await res.json();
    setMonthDefault();
    renderTodo();
    renderStatsView();
  }catch(e){
    document.getElementById("newsGrid").innerHTML="<div class=\"empty\">No se pudo conectar con Notion.<br>Intenta recargar la página.</div>";
    console.error(e);

}

// ==================== FILTER LOGIC ====================
function fechaStr(n){if(!n.dia)return"Sin fecha";return n.dia+" "+MESES[n.mes-1]+" "+n.anio;}
function fechaISO(n){return n.anio?n.anio*10000+n.mes*100+n.dia:0;}
function toDateNum(iso){return iso?parseInt(iso.replace(/-/g,""),10):0;}
function filtradas(){
  return noticias.filter(n=>{
    if(filtros.desde||filtros.hasta){const nNum=fechaISO(n);if(filtros.desde&&nNum<toDateNum(filtros.desde))return false;if(filtros.hasta&&nNum>toDateNum(filtros.hasta))return false;}
    if(filtros.impacto!=="all"&&n.impacto!==filtros.impacto)return false;
    if(filtros.sector!=="all"&&n.sector!==filtros.sector)return false;
    if(filtros.factor!=="all"&&n.factor!==filtros.factor)return false;
    if(filtros.prio&&!n.prioritario)return false;
    if(filtros.q){const h=(n.titulo+" "+(n.desc||"")).toLowerCase();if(!h.includes(filtros.q))return false;}
    return true;
  }).sort((a,b)=>fechaISO(b)-fechaISO(a));
}
function disponibles(campo){
  const counts={};
  noticias.filter(n=>{
    if(campo!=="impacto"&&filtros.impacto!=="all"&&n.impacto!==filtros.impacto)return false;
    if(campo!=="sector"&&filtros.sector!=="all"&&n.sector!==filtros.sector)return false;
    if(campo!=="factor"&&filtros.factor!=="all"&&n.factor!==filtros.factor)return false;
    if(campo!=="prio"&&filtros.prio&&!n.prioritario)return false;
    return true;
  }).forEach(n=>{if(n[campo])counts[n[campo]]=(counts[n[campo]]||0)+1;});
  return counts;
}

function renderImpactoChips(){
  const disp=disponibles('impacto');
  const impactos=['Alto','Medio','Bajo'];
  const all=filtros.impacto==='all';
  let h=`<span class="chip ${all?'on-todos':''}" onclick="setFiltro('impacto','all')">Todos</span>`;
  impactos.forEach(v=>{
    const a=filtros.impacto===v, d=disp[v]||a;
    const cls=a?'on-'+v.toLowerCase():d?'':'disabled';
    const click=d||a?`onclick="setFiltro('impacto','${v}')"` :'';
    const cnt=d&&!a?`<span style="font-size:9px;opacity:.6">(${disp[v]})</span>`:'';
    h+=`<span class="chip ${cls}" ${click}>${v}${cnt}</span>`;
  });
  document.getElementById('chips-impacto').innerHTML=h;
  document.getElementById('chip-prio').className='chip '+(filtros.prio?'on-prio':'');

function renderDropdown(name,opciones){
  const counts=disponibles(name);
  const sel=filtros[name];
  const trigger=document.getElementById('trigger-'+name);
  const label=document.getElementById('label-'+name);
  const allEl=document.getElementById('all-'+name);
  const list=document.getElementById('list-'+name);
  if(sel!=='all'){
    trigger.classList.add('has-value');
    label.innerHTML=`<span class="dropdown-badge">1</span>${sel}`;
  } else {
    trigger.classList.remove('has-value');
    label.textContent=name==='sector'?'Todos los sectores':'Todos los factores';
  }
  allEl.className='dropdown-all'+(sel==='all'?' selected':'');
  list.innerHTML=opciones.map(op=>{
    const count=counts[op]||0;
    const isSel=sel===op;
    const isDis=count===0&&!isSel;
    const safeOp=op.replace(/'/g,"\'");
    return `<div class="dropdown-item${isSel?' selected':''}${isDis?' disabled-item':''}" data-val="${op}" onclick="selectDropdown('${name}','${safeOp}')">
      <span>${op}</span>${count>0&&!isSel?`<span class="item-count">${count}</span>`:''}
    </div>`;
  }).join('');
}

function renderActiveFilters(){
  const tags=[];
  if(filtros.desde||filtros.hasta){
    const d=filtros.desde?filtros.desde.slice(5).split('-').reverse().join('/'):'…';
    const h=filtros.hasta?filtros.hasta.slice(5).split('-').reverse().join('/'):'…';
    tags.push({label:`Fecha: ${d} → ${h}`,clear:()=>{
      filtros.desde=null;filtros.hasta=null;
      ['fDesde','fHasta'].forEach(id=>{document.getElementById(id).value='';document.getElementById(id).classList.remove('activo');});
      document.getElementById('weekHint').textContent='';renderTodo();
    }});
  }
  if(filtros.impacto!=='all') tags.push({label:`Impacto: ${filtros.impacto}`,clear:()=>{filtros.impacto='all';renderTodo();}});
  if(filtros.sector!=='all')  tags.push({label:`Sector: ${filtros.sector}`,clear:()=>{filtros.sector='all';renderTodo();}});
  if(filtros.factor!=='all')  tags.push({label:`Factor: ${filtros.factor}`,clear:()=>{filtros.factor='all';renderTodo();}});
  if(filtros.prio)            tags.push({label:'Prioritarias',clear:()=>{filtros.prio=false;renderTodo();}});
  if(filtros.q)               tags.push({label:`Búsqueda: "${filtros.q}"`,clear:()=>{filtros.q='';document.getElementById('searchInput').value='';document.getElementById('searchClear').classList.remove('visible');renderTodo();}});
  window._afTags=tags;
  const af=document.getElementById('activeFilters');
  if(tags.length){
    af.innerHTML='<span class="af-label">Filtros activos:</span>'+
      tags.map((t,i)=>`<span class="af-tag">${t.label}<button onclick="clearTag(${i})">×</button></span>`).join('')+
      '<span class="af-clear" onclick="resetFiltros()">Limpiar todo</span>';
  } else { af.innerHTML=''; }
}

function clearTag(i){if(window._afTags&&window._afTags[i])window._afTags[i].clear();}
function setFiltro(k,v){filtros[k]=v;renderTodo();}
function togglePrio(){filtros.prio=!filtros.prio;renderTodo();}
function resetFiltros(){filtros={impacto:"all",sector:"all",factor:"all",prio:false,desde:null,hasta:null,q:""};document.getElementById("searchInput").value="";document.getElementById("searchClear").classList.remove("visible");setMonthDefault();renderTodo();}

function highlight(text,q){if(!q||!text)return text||"";const idx=text.toLowerCase().indexOf(q);if(idx<0)return text;return text.slice(0,idx)+"<mark style=\"background:#FCE8F3;border-radius:2px;padding:0 1px;color:var(--bg-magenta-dark)\">"+text.slice(idx,idx+q.length)+"</mark>"+highlight(text.slice(idx+q.length),q);}

// ==================== RENDER KANBAN ====================
function renderKanban(vis,q){
  const cols={};
  FACTORES.forEach(f=>{cols[f]=[];});
  vis.forEach(n=>{
    const key=n.factor&&FACTORES.includes(n.factor)?n.factor:"Sin factor";
    if(!cols[key])cols[key]=[];
    cols[key].push(n);
  });
  const activeFactors=FACTORES.filter(f=>cols[f]&&cols[f].length>0);
  if(cols["Sin factor"]&&cols["Sin factor"].length>0) activeFactors.push("Sin factor");
  if(!activeFactors.length){
    document.getElementById("kanbanGrid").innerHTML='<div class="empty">No hay noticias con los filtros seleccionados.</div>';
    return;
  }
  document.getElementById("kanbanGrid").innerHTML = activeFactors.map(factor => {
    const cards = cols[factor]||[];
    const color = FACTOR_COLORS[factor]||"#9A8F94";
    return `<div class="kanban-col">
      <div class="kanban-col-header" style="border-top:3px solid var(--gris4)">
        <span class="kanban-col-title">${factor}</span>
        <span class="kanban-col-count" style="background:var(--gris6)">${cards.length}</span>
      </div>
      <div class="kanban-cards">${cards.map(n=>kCard(n,q)).join("")}</div>

  }).join("");
}

  const bajo=vis.filter(n=>n.impacto==="Bajo").length;
  const prios=vis.filter(n=>n.prioritario).length;

  // Factor counts
  const factorC={};vis.forEach(n=>{if(n.factor)factorC[n.factor]=(factorC[n.factor]||0)+1;});
  const factorSorted=Object.entries(factorC).sort((a,b)=>b[1]-a[1]);
  const maxF=factorSorted[0]?factorSorted[0][1]:1;

  // Sector counts
  const sectorC={};vis.forEach(n=>{if(n.sector)sectorC[n.sector]=(sectorC[n.sector]||0)+1;});
  const sectorSorted=Object.entries(sectorC).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxS=sectorSorted[0]?sectorSorted[0][1]:1;

  // Daily trend (last 30 days)
  const today=new Date();
  const days=[];for(let i=29;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);days.push(toISODate(d));}
  const dayCounts={};
  noticias.forEach(n=>{if(n.anio&&n.mes&&n.dia){const key=n.anio+"-"+String(n.mes).padStart(2,"0")+"-"+String(n.dia).padStart(2,"0");dayCounts[key]=(dayCounts[key]||0)+1;}});
  const vals=days.map(d=>dayCounts[d]||0);
  const maxV=Math.max(...vals,1);

  // Impacto x Factor stacked
  const ifData={};
  FACTORES.forEach(f=>{ifData[f]={Alto:0,Medio:0,Bajo:0};});
  vis.forEach(n=>{if(n.factor&&ifData[n.factor]&&n.impacto)ifData[n.factor][n.impacto]++;});
  const ifSorted=Object.entries(ifData).filter(([,v])=>v.Alto+v.Medio+v.Bajo>0).sort((a,b)=>(b[1].Alto+b[1].Medio+b[1].Bajo)-(a[1].Alto+a[1].Medio+a[1].Bajo));

  // Donut SVG builder
  function donutSVG(data,size){
    const r=size*0.38,cx=size/2,cy=size/2,sw=size*0.18;
    let sa=0;
    const tot=data.reduce((a,b)=>a+b.val,0)||1;
    const paths=data.filter(d=>d.val>0).map(d=>{
      const pct=d.val/tot,angle=pct*2*Math.PI;
      const x1=cx+r*Math.sin(sa),y1=cy-r*Math.cos(sa);
      const x2=cx+r*Math.sin(sa+angle),y2=cy-r*Math.cos(sa+angle);
      const la=angle>Math.PI?1:0;
      const path="M "+x1+" "+y1+" A "+r+" "+r+" 0 "+la+" 1 "+x2+" "+y2;
      sa+=angle;
      return"<path d=\""+path+"\" fill=\"none\" stroke=\""+d.color+"\" stroke-width=\""+sw+"\" stroke-linecap=\"butt\"/>";
    }).join("");
    return"<svg width=\""+size+"\" height=\""+size+"\" viewBox=\"0 0 "+size+" "+size+"\">"+paths+"<text x=\""+cx+"\" y=\""+cy+"\" text-anchor=\"middle\" dominant-baseline=\"middle\" font-size=\""+size*0.18+"\" font-weight=\"800\" font-family=\"Montserrat,sans-serif\" fill=\"#1A0A12\">"+tot+"</text></svg>";
  }

  // Sparkline path builder
  function sparkPath(vals,W,H,pad){
    const mx=Math.max(...vals,1);
    return vals.map((v,i)=>{const x=pad+(i/(vals.length-1))*(W-pad*2);const y=H-pad-(v/mx)*(H-pad*2);return(i===0?"M":"L")+" "+x+" "+y;}).join(" ");
  }

  const W=400,H=80,pad=4;
  const path=sparkPath(vals,W,H,pad);
  const total30=vals.reduce((a,b)=>a+b,0);
  const avg30=total30?Math.round(total30/vals.filter(v=>v>0).length)||0:0;

  document.getElementById("statsGrid").innerHTML=
    // KPI ROW

      "<div class=\"kpi-card\"><div class=\"kpi-num\">"+total+"</div><div class=\"kpi-label\">Total noticias</div><div class=\"kpi-sub\">período seleccionado</div></div>"+
      "<div class=\"kpi-card\" style=\"--kpi-c:var(--rojo)\"><div class=\"kpi-num\" style=\"color:var(--rojo)\">"+alto+"</div><div class=\"kpi-label\">Alto impacto</div><div class=\"kpi-sub\" style=\"color:var(--rojo)\">"+Math.round(alto/total*100)+"% del total</div></div>"+
      "<div class=\"kpi-card\"><div class=\"kpi-num\" style=\"color:var(--gris6)\">"+bajo+"</div><div class=\"kpi-label\">Bajo impacto</div><div class=\"kpi-sub\" style=\"color:var(--gris6)\">"+Math.round(bajo/total*100)+"% del total</div></div>"+
      "<div class=\"kpi-card\"><div class=\"kpi-num\" style=\"color:var(--bg-magenta)\">"+prios+"</div><div class=\"kpi-label\">Prioritarias</div><div class=\"kpi-sub\">"+Math.round(prios/total*100)+"% del total</div></div>"+
    "</div>"+
    // ROW 1: Factor bars + Donut impacto
    "<div class=\"sv-grid\">"+
      "<div class=\"sv-panel\"><div class=\"sv-panel-title\">Noticias por Factor</div><div class=\"hbar-list\">"+
        factorSorted.map(([name,count],i)=>"<div class=\"hbar-row\"><span class=\"hbar-label\" title=\""+name+"\">"+name+"</span><div class=\"hbar-track\"><div class=\"hbar-fill\" style=\"width:"+(count/maxF*100)+"%;background:"+["#E2007A","#B5005F","#C8406A","#9A3050","#6B6068","#9A8F94","#CFC8CC","#1A0A12"][factorSorted.indexOf(factorSorted.find(([n])=>n===name))%8]+"\"></div></div><span class=\"hbar-val\">"+count+"</span><span class=\"hbar-pct\">"+Math.round(count/total*100)+"%</span></div>").join("")+
      "</div></div>"+
      "<div class=\"sv-panel\"><div class=\"sv-panel-title\">Distribución por Impacto</div>"+
        "<div class=\"donut-wrap-lg\">"+
          donutSVG([{val:alto,color:"#C0392B"},{val:medio,color:"#E2007A"},{val:bajo,color:"#CFC8CC"}],140)+
          "<div class=\"donut-legend-lg\">"+
            "<div class=\"donut-leg-item-lg\"><div class=\"donut-leg-dot-lg\" style=\"background:#C0392B\"></div><span class=\"donut-leg-label\">Alto</span><span class=\"donut-leg-val\">"+alto+"</span><span class=\"donut-leg-pct\">"+Math.round(alto/total*100)+"%</span></div>"+
            "<div class=\"donut-leg-item-lg\"><div class=\"donut-leg-dot-lg\" style=\"background:#E2007A\"></div><span class=\"donut-leg-label\">Medio</span><span class=\"donut-leg-val\">"+medio+"</span><span class=\"donut-leg-pct\">"+Math.round(medio/total*100)+"%</span></div>"+

          "</svg>"+
          "<div style=\"display:flex;justify-content:space-between;margin-top:4px\">"+
            "<span style=\"font-size:9px;color:var(--gris5);font-weight:500\">"+days[0].slice(5).split("-").reverse().join("/")+"</span>"+
            "<span style=\"font-size:9px;color:var(--gris5);font-weight:500\">"+days[29].slice(5).split("-").reverse().join("/")+"</span>"+
          "</div>"+
        "</div>"+
        "<div style=\"display:flex;flex-direction:column;gap:10px;flex-shrink:0\">"+
          "<div style=\"text-align:center\"><div style=\"font-size:28px;font-weight:800;color:var(--negro);letter-spacing:-0.02em\">"+total30+"</div><div style=\"font-size:9px;color:var(--gris5);font-weight:700;text-transform:uppercase;letter-spacing:0.1em\">Total 30 días</div></div>"+
          "<div style=\"text-align:center\"><div style=\"font-size:28px;font-weight:800;color:var(--bg-magenta);letter-spacing:-0.02em\">"+avg30+"</div><div style=\"font-size:9px;color:var(--gris5);font-weight:700;text-transform:uppercase;letter-spacing:0.1em\">Prom. días activos</div></div>"+
        "</div>"+
      "</div>"+
    "</div>";
}

// ==================== VIEW ====================
function setView(v){
  currentView=v;
  ["list","kanban","stats"].forEach(name=>{
    document.getElementById(name==="list"?"newsGrid":name+"Grid").classList.toggle("active",v===name);
    document.getElementById("btn"+name.charAt(0).toUpperCase()+name.slice(1)+"View").classList.toggle("active",v===name);
  });
  if(v==="stats")renderStatsView();
  else if(v==="kanban")renderKanban(filtradas(),filtros.q);
}

// ==================== HEADER ====================
function renderHeader(){
  document.getElementById("selNum").textContent=selected.size;
  document.getElementById("selIndicator").classList.toggle("visible",selected.size>0);
  document.getElementById("btnPdf").classList.toggle("visible",selected.size>0);
}
function toggleSel(id){if(selected.has(id))selected.delete(id);else selected.add(id);renderCards();renderHeader();}

// ==================== MODAL ====================
function abrirModal(){document.getElementById("modalDesc").textContent="Se incluirán "+selected.size+" noticia"+(selected.size!==1?"s":"")+" en el reporte.";document.getElementById("modalStatus").textContent="";document.getElementById("btnGenerar").disabled=false;document.getElementById("modalOverlay").classList.add("open");}
function cerrarModal(){document.getElementById("modalOverlay").classList.remove("open");}

// ==================== PDF ====================
function impactoColorPDF(v){if(v==="Alto")return{bg:"#FEEAEA",color:"#B0001E",border:"#F5C0C0"};if(v==="Medio")return{bg:"#FCE8F3",color:"#B5005F",border:"#F0A0C8"};return{bg:"#F3F0F2",color:"#6B6068",border:"#CFC8CC"};}
function generarPDF(){
  const titulo=document.getElementById("pdfTitulo").value||"Reporte de noticias de mayor impacto";
  const autor=document.getElementById("pdfAutor").value||"Equipo editorial";
  const sels=noticias.filter(n=>selected.has(n.id));
  const hoy=new Date().toLocaleDateString("es-EC",{year:"numeric",month:"long",day:"numeric"});
  const cI={Alto:0,Medio:0,Bajo:0};const cS={};
  sels.forEach(n=>{if(n.impacto)cI[n.impacto]=(cI[n.impacto]||0)+1;if(n.sector)cS[n.sector]=(cS[n.sector]||0)+1;});
  const filasI=Object.entries(cI).filter(([,v])=>v>0).map(([k,v])=>{const c=impactoColorPDF(k);return"<tr><td style=\"padding:6px 14px\"><span style=\"background:"+c.bg+";color:"+c.color+";border:1px solid "+c.border+";padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700\">"+k+"</span></td><td style=\"padding:6px 14px;font-weight:800;text-align:center\">"+v+"</td></tr>";}).join("");
  const filasS=Object.entries(cS).map(([k,v])=>"<tr><td style=\"padding:5px 14px;color:#6B6068;font-size:12px\">"+k+"</td><td style=\"padding:5px 14px;font-weight:700;text-align:center;font-size:12px\">"+v+"</td></tr>").join("");
  const noticiasHTML=sels.map(n=>{const c=impactoColorPDF(n.impacto);return"<div style=\"margin-bottom:20px;padding:20px;background:#FAF9FA;border-radius:10px;border:1px solid #E8E3E6;border-left:"+(n.prioritario?"3px solid #E2007A":"3px solid #E8E3E6")+"\"><div style=\"margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap\"><span style=\"font-size:11px;color:#9A8F94\">"+fechaStr(n)+(n.fuente?" · "+n.fuente:"")+"</span>"+(n.prioritario?"<span style=\"background:#E2007A;color:#fff;padding:1px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase\">Prioritario</span>":"")+"</div><p style=\"font-size:15px;font-weight:700;color:#1A0A12;margin-bottom:10px;line-height:1.4\">"+n.titulo+"</p><div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px\"><span style=\"background:"+c.bg+";color:"+c.color+";border:1px solid "+c.border+";padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700\">"+n.impacto+"</span>"+(n.sector?"<span style=\"background:#F3F0F2;color:#6B6068;border:1px solid #E8E3E6;padding:2px 10px;border-radius:20px;font-size:11px\">"+n.sector+"</span>":"")+(n.factor?"<span style=\"background:#F3F0F2;color:#6B6068;border:1px solid #E8E3E6;padding:2px 10px;border-radius:20px;font-size:11px\">"+n.factor+"</span>":"")+"</div><p style=\"font-size:13px;color:#6B6068;line-height:1.7\">"+n.desc+"</p>"+(n.pdfUrl?"<p style=\"margin-top:8px\"><a href=\""+n.pdfUrl+"\" style=\"font-size:12px;color:#E2007A;font-weight:600\">📄 Ver documento adjunto</a></p>":"")+"</div>";}).join("");
  const html="<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><title>"+titulo+"</title><link href=\"https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap\" rel=\"stylesheet\"><style>body{margin:0;padding:0;background:#fff;font-family:Montserrat,Arial,sans-serif;color:#1A0A12}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div style=\"max-width:820px;margin:0 auto\"><div style=\"background:linear-gradient(90deg,#1A0A12,#2D0D1E);padding:28px 40px;border-bottom:3px solid #E2007A\"><p style=\"font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;font-weight:600\">Monitor de Noticias · Banco Guayaquil</p><h1 style=\"font-size:22px;font-weight:800;color:#fff;margin-bottom:4px\">"+titulo+"</h1><p style=\"font-size:12px;color:rgba(255,255,255,.35)\">"+hoy+" · "+autor+"</p></div><div style=\"padding:32px 40px;background:#fff\"><div style=\"display:flex;gap:20px;margin-bottom:32px;flex-wrap:wrap\"><div style=\"flex:1;min-width:180px\"><p style=\"font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#E2007A;margin-bottom:8px;font-weight:700\">Por impacto</p><table style=\"width:100%;border-collapse:collapse;border:1px solid #E8E3E6\"><tbody>"+filasI+"</tbody></table></div><div style=\"flex:2;min-width:260px\"><p style=\"font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#E2007A;margin-bottom:8px;font-weight:700\">Por sector</p><table style=\"width:100%;border-collapse:collapse;border:1px solid #E8E3E6\"><tbody>"+filasS+"</tbody></table></div></div><p style=\"font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#E2007A;margin-bottom:16px;border-top:1px solid #E8E3E6;padding-top:24px;font-weight:700\">Noticias seleccionadas</p>"+noticiasHTML+"<div style=\"border-top:1px solid #E8E3E6;padding-top:16px;margin-top:8px;text-align:center\"><p style=\"font-size:11px;color:#CFC8CC\">Documento confidencial · Banco Guayaquil · "+hoy+"</p></div></div></div></body></html>";
  cerrarModal();showNotif("Reporte generado","ok");selected.clear();renderCards();renderHeader();
  const w=window.open("","_blank");if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);}
}

function showNotif(msg,tipo){const el=document.getElementById("notif");el.textContent=msg;el.className="notif "+tipo;setTimeout(()=>{el.className="notif";},3500);}
</script>
</body>
