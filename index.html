<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Noticias · Keyword</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --negro:#0A0A0A;--negro2:#141414;--negro3:#1E1E1E;--negro4:#2A2A2A;
  --blanco:#FFFFFF;--blanco2:rgba(255,255,255,0.85);--blanco3:rgba(255,255,255,0.5);--blanco4:rgba(255,255,255,0.15);--blanco5:rgba(255,255,255,0.06);
  --rojo:#C0392B;--rojo-claro:rgba(192,57,43,0.15);
  --ambar:#D4861A;--ambar-claro:rgba(212,134,26,0.15);
  --verde:#27AE60;--verde-claro:rgba(39,174,96,0.15);
  --naranja:#E67E22;
  --borde:rgba(255,255,255,0.1);--borde2:rgba(255,255,255,0.06);
  --radio:8px;--radio-pill:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--negro);color:var(--blanco);min-height:100vh}

/* HEADER */
header{background:var(--negro);border-bottom:1px solid var(--borde);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.logo-img{height:22px;object-fit:contain;filter:brightness(1)}
.header-center{font-size:12px;color:var(--blanco3);letter-spacing:0.12em;text-transform:uppercase;font-weight:500}
.header-right{display:flex;align-items:center;gap:12px}
.sel-indicator{font-size:12px;color:var(--blanco3);display:none}
.sel-indicator.visible{display:block}
.sel-indicator span{color:var(--blanco);font-weight:600}
.btn-pdf{background:var(--blanco);color:var(--negro);border:none;border-radius:var(--radio);padding:7px 16px;font-size:12px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;letter-spacing:0.02em;display:none;transition:opacity .15s}
.btn-pdf.visible{display:block}
.btn-pdf:hover{opacity:0.85}

/* LAYOUT */
.main{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 56px)}

/* SIDEBAR */
.sidebar{background:var(--negro2);border-right:1px solid var(--borde);padding:1.5rem 1.25rem;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-track{background:transparent}.sidebar::-webkit-scrollbar-thumb{background:var(--borde)}
.sidebar-section{margin-bottom:1.5rem}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--blanco3);margin-bottom:10px;display:block}
.sidebar-divider{border:none;border-top:1px solid var(--borde);margin:1.25rem 0}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;padding:4px 11px;border-radius:var(--radio-pill);border:1px solid var(--borde);background:transparent;color:var(--blanco3);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:'Inter',sans-serif;font-weight:400}
.chip:hover:not(.disabled){border-color:rgba(255,255,255,0.3);color:var(--blanco)}
.chip.disabled{opacity:0.25;cursor:default;pointer-events:none}
.chip.on-todos{background:var(--blanco);color:var(--negro);border-color:var(--blanco);font-weight:600}
.chip.on-alto{background:var(--rojo-claro);color:#E74C3C;border-color:rgba(231,76,60,0.4);font-weight:500}
.chip.on-medio{background:var(--ambar-claro);color:#E67E22;border-color:rgba(230,126,34,0.4);font-weight:500}
.chip.on-bajo{background:var(--verde-claro);color:#2ECC71;border-color:rgba(46,204,113,0.4);font-weight:500}
.chip.on-active{background:var(--blanco4);color:var(--blanco);border-color:rgba(255,255,255,0.35);font-weight:500}
.chip.on-prio{background:rgba(230,126,34,0.15);color:#E67E22;border-color:rgba(230,126,34,0.4);font-weight:500}

/* DATE FILTERS */
.date-selects{display:flex;flex-direction:column;gap:6px}
.date-select-wrap label{font-size:10px;color:var(--blanco3);display:block;margin-bottom:3px;letter-spacing:0.05em}
.date-select-wrap select{width:100%;font-family:'Inter',sans-serif;font-size:12px;padding:6px 10px;border-radius:var(--radio);border:1px solid var(--borde);background:var(--negro3);color:var(--blanco3);cursor:pointer;appearance:none}
.date-select-wrap select.activo{background:var(--negro4);border-color:rgba(255,255,255,0.3);color:var(--blanco)}
.date-select-wrap select option{background:var(--negro3)}

.reset-btn{width:100%;font-size:11px;padding:7px;border-radius:var(--radio);border:1px solid var(--borde);background:transparent;color:var(--blanco3);cursor:pointer;font-family:'Inter',sans-serif;margin-top:.75rem;transition:all .12s;letter-spacing:0.04em}
.reset-btn:hover{border-color:rgba(255,255,255,0.25);color:var(--blanco)}

/* CONTENT */
.content{padding:1.5rem 2rem;background:var(--negro)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{border-radius:var(--radio);padding:14px 16px;border:1px solid var(--borde);background:var(--negro2)}
.stat-alto{border-color:rgba(192,57,43,0.3)}
.stat-medio{border-color:rgba(212,134,26,0.3)}
.stat-bajo{border-color:rgba(39,174,96,0.3)}
.stat-prio{border-color:rgba(255,255,255,0.15)}
.stat-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}
.stat-alto .stat-label{color:rgba(231,76,60,0.8)}
.stat-medio .stat-label{color:rgba(230,126,34,0.8)}
.stat-bajo .stat-label{color:rgba(46,204,113,0.8)}
.stat-prio .stat-label{color:var(--blanco3)}
.stat-num{font-size:26px;font-weight:700;color:var(--blanco)}

/* ACTIVE FILTERS */
.active-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;align-items:center;min-height:0}
.af-label{font-size:11px;color:var(--blanco3)}
.af-tag{font-size:11px;padding:3px 10px;border-radius:var(--radio-pill);background:var(--blanco4);border:1px solid var(--borde);color:var(--blanco2);display:flex;align-items:center;gap:5px}
.af-tag button{background:none;border:none;cursor:pointer;color:var(--blanco3);font-size:14px;line-height:1;padding:0}
.af-tag button:hover{color:var(--blanco)}
.af-clear{font-size:11px;color:var(--blanco3);cursor:pointer;text-decoration:underline}
.af-clear:hover{color:var(--blanco)}

/* RESULTS BAR */
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.results-count{font-size:12px;color:var(--blanco3)}
.results-count strong{color:var(--blanco);font-weight:600}

/* NEWS CARDS */
.news-card{background:var(--negro2);border:1px solid var(--borde);border-radius:var(--radio);padding:1rem 1.25rem;margin-bottom:8px;cursor:pointer;transition:all .12s}
.news-card:hover{border-color:rgba(255,255,255,0.2);background:var(--negro3)}
.news-card.selected{border-color:rgba(255,255,255,0.5);background:var(--negro3)}
.news-card.prioritario{border-left:2px solid var(--naranja)}
.card-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.card-chk{width:16px;height:16px;border:1px solid rgba(255,255,255,0.25);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .12s}
.card-chk.on{background:var(--blanco);border-color:var(--blanco)}
.card-chk.on::after{content:'';width:8px;height:4px;border-left:1.5px solid var(--negro);border-bottom:1.5px solid var(--negro);transform:rotate(-45deg) translateY(-1px);display:block}
.card-header{flex:1}
.card-title{font-size:14px;font-weight:600;color:var(--blanco);line-height:1.4;margin-bottom:5px}
.card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.card-date{font-size:11px;color:var(--blanco3)}
.card-fuente{font-size:11px;color:var(--blanco3)}
.card-sep{font-size:11px;color:var(--blanco4)}
.prio-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--radio-pill);background:rgba(230,126,34,0.15);color:#E67E22;border:1px solid rgba(230,126,34,0.3);flex-shrink:0;letter-spacing:0.04em;text-transform:uppercase}
.card-desc{font-size:13px;color:var(--blanco3);line-height:1.65;padding-left:26px;margin-bottom:10px}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;padding-left:26px}
.badge{font-size:11px;padding:3px 9px;border-radius:var(--radio-pill);font-weight:500;display:inline-block;white-space:nowrap}
.b-alto{background:rgba(192,57,43,0.15);color:#E74C3C;border:1px solid rgba(231,76,60,0.25)}
.b-medio{background:rgba(212,134,26,0.15);color:#E67E22;border:1px solid rgba(230,126,34,0.25)}
.b-bajo{background:rgba(39,174,96,0.15);color:#2ECC71;border:1px solid rgba(46,204,113,0.25)}
.b-tag{background:var(--blanco5);color:var(--blanco3);border:1px solid var(--borde2)}

/* LOADING / EMPTY */
.loading,.empty{text-align:center;padding:4rem 2rem;color:var(--blanco3);font-size:14px}
.spinner{width:28px;height:28px;border:1.5px solid var(--borde);border-top-color:var(--blanco);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--negro2);border:1px solid var(--borde);border-radius:var(--radio);padding:2rem;width:100%;max-width:440px}
.modal h3{font-size:18px;font-weight:700;color:var(--blanco);margin-bottom:4px}
.modal p{font-size:13px;color:var(--blanco3);margin-bottom:1.25rem}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;color:var(--blanco3);margin-bottom:5px;letter-spacing:0.05em;text-transform:uppercase;font-weight:500}
.modal-field input{width:100%;font-family:'Inter',sans-serif;font-size:13px;padding:9px 12px;border-radius:var(--radio);border:1px solid var(--borde);background:var(--negro3);color:var(--blanco)}
.modal-field input::placeholder{color:var(--blanco3)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-cancel{font-size:13px;padding:8px 16px;border-radius:var(--radio);border:1px solid var(--borde);background:transparent;cursor:pointer;color:var(--blanco3);font-family:'Inter',sans-serif}
.btn-cancel:hover{color:var(--blanco);border-color:rgba(255,255,255,0.25)}
.btn-generar{font-size:13px;padding:8px 20px;border-radius:var(--radio);border:none;background:var(--blanco);color:var(--negro);cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.btn-generar:hover{opacity:0.85}
.btn-generar:disabled{opacity:.35;cursor:not-allowed}
.modal-status{font-size:12px;color:var(--blanco3);margin-top:8px;min-height:18px}

/* NOTIF */
.notif{position:fixed;bottom:1.5rem;right:1.5rem;font-size:12px;padding:10px 16px;border-radius:var(--radio);z-index:300;display:none;border:1px solid var(--borde)}
.notif.ok{background:rgba(39,174,96,0.15);color:#2ECC71;border-color:rgba(46,204,113,0.3);display:block}
.notif.err{background:rgba(192,57,43,0.15);color:#E74C3C;border-color:rgba(231,76,60,0.3);display:block}

@media(max-width:768px){
  .main{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{position:relative;top:0;height:auto}
  .stats{grid-template-columns:repeat(2,1fr)}
  .content{padding:1rem}
}
</style>
</head>

const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SECTORES=['Administración pública','Salud y asistencia a la persona','Telecomunicaciones y suministros','Minería y petróleo','Agricultura Ganadería Pesca y Acuicultura','Construcción','Manufactura','Actividades financieras y Seguros','Automotriz','Comercio','Finanzas Públicas','Política Pública','Convenios Internacionales'];
const FACTORES=['Socioeconómico','Ambiental','Legal','Político','Económico','Comercio Exterior','Impuestos','Seguridad'];
let noticias=[],selected=new Set();
let filtros={impacto:'all',sector:'all',factor:'all',prio:false,anio:'all',mes:'all',dia:'all'};

async function cargarNoticias(){
  document.getElementById('newsGrid').innerHTML='<div class="loading"><div class="spinner"></div>Cargando noticias...</div>';
  try{
    const res=await fetch('/.netlify/functions/notion');
    if(!res.ok)throw new Error('HTTP '+res.status);
    noticias=await res.json();
    renderTodo();
  }catch(e){
    document.getElementById('newsGrid').innerHTML='<div class="empty">No se pudo conectar con Notion.<br>Intenta recargar la página.</div>';
    console.error(e);
  }
}

function fechaStr(n){if(!n.dia)return'Sin fecha';return n.dia+' '+MESES[n.mes-1]+' '+n.anio;}
function fechaISO(n){return n.anio?n.anio*10000+n.mes*100+n.dia:0;}
function setFiltro(k,v){filtros[k]=v;renderTodo();}
function setFiltroStr(k,v){filtros[k]=v;renderTodo();}
function setFecha(k,v){filtros[k]=v==='all'?'all':parseInt(v);if(k==='anio'){filtros.mes='all';filtros.dia='all';}if(k==='mes'){filtros.dia='all';}renderTodo();}
function togglePrio(){filtros.prio=!filtros.prio;renderTodo();}
function resetFiltros(){filtros={impacto:'all',sector:'all',factor:'all',prio:false,anio:'all',mes:'all',dia:'all'};renderTodo();}

function filtradas(){
  return noticias.filter(n=>{
    if(filtros.anio!=='all'&&n.anio!=filtros.anio)return false;
    if(filtros.mes!=='all'&&n.mes!=filtros.mes)return false;
    if(filtros.dia!=='all'&&n.dia!=filtros.dia)return false;
    if(filtros.impacto!=='all'&&n.impacto!==filtros.impacto)return false;
    if(filtros.sector!=='all'&&n.sector!==filtros.sector)return false;
    if(filtros.factor!=='all'&&n.factor!==filtros.factor)return false;
    if(filtros.prio&&!n.prioritario)return false;
    return true;
  }).sort((a,b)=>fechaISO(b)-fechaISO(a));
}

// Calcula qué valores están disponibles dado el filtro actual (excluyendo el filtro de esa misma dimensión)
function disponibles(campo){
  const s=new Set();
  noticias.filter(n=>{
    if(campo!=='anio'&&filtros.anio!=='all'&&n.anio!=filtros.anio)return false;
    if(campo!=='mes'&&filtros.mes!=='all'&&n.mes!=filtros.mes)return false;
    if(campo!=='dia'&&filtros.dia!=='all'&&n.dia!=filtros.dia)return false;
    if(campo!=='impacto'&&filtros.impacto!=='all'&&n.impacto!==filtros.impacto)return false;
    if(campo!=='sector'&&filtros.sector!=='all'&&n.sector!==filtros.sector)return false;
    if(campo!=='factor'&&filtros.factor!=='all'&&n.factor!==filtros.factor)return false;
    if(campo!=='prio'&&filtros.prio&&!n.prioritario)return false;
    return true;
  }).forEach(n=>{if(n[campo])s.add(n[campo]);});
  return s;
}

function renderTodo(){renderStats();renderDateFilters();renderChips();renderActiveFilters();renderCards();renderHeader();}

function renderStats(){
  const vis=filtradas();
  const alto=noticias.filter(n=>n.impacto==='Alto').length;
  const medio=noticias.filter(n=>n.impacto==='Medio').length;
  const bajo=noticias.filter(n=>n.impacto==='Bajo').length;
  const prios=noticias.filter(n=>n.prioritario).length;
  document.getElementById('statsBar').innerHTML=
    '<div class="stat stat-alto"><div class="stat-label">Alto impacto</div><div class="stat-num">'+alto+'</div></div>'+
    '<div class="stat stat-medio"><div class="stat-label">Medio impacto</div><div class="stat-num">'+medio+'</div></div>'+
    '<div class="stat stat-bajo"><div class="stat-label">Bajo impacto</div><div class="stat-num">'+bajo+'</div></div>'+
    '<div class="stat stat-prio"><div class="stat-label">Prioritarias</div><div class="stat-num">'+prios+'</div></div>';
}

function renderDateFilters(){
  const anios=[...new Set(noticias.filter(n=>n.anio).map(n=>n.anio))].sort((a,b)=>b-a);
  const mesesDisp=filtros.anio==='all'?[...new Set(noticias.filter(n=>n.mes).map(n=>n.mes))].sort((a,b)=>a-b):[...new Set(noticias.filter(n=>n.anio==filtros.anio&&n.mes).map(n=>n.mes))].sort((a,b)=>a-b);
  const diasDisp=(()=>{let s=noticias.filter(n=>n.dia);if(filtros.anio!=='all')s=s.filter(n=>n.anio==filtros.anio);if(filtros.mes!=='all')s=s.filter(n=>n.mes==filtros.mes);return[...new Set(s.map(n=>n.dia))].sort((a,b)=>a-b);})();
  document.getElementById('fAnio').innerHTML='<option value="all">Todos</option>'+anios.map(a=>'<option value="'+a+'"'+(filtros.anio==a?' selected':'')+'>'+a+'</option>').join('');
  document.getElementById('fMes').innerHTML='<option value="all">Todos</option>'+mesesDisp.map(m=>'<option value="'+m+'"'+(filtros.mes==m?' selected':'')+'>'+MESES[m-1]+'</option>').join('');
  document.getElementById('fDia').innerHTML='<option value="all">Todos</option>'+diasDisp.map(d=>'<option value="'+d+'"'+(filtros.dia==d?' selected':'')+'>'+d+'</option>').join('');
  document.getElementById('fAnio').className=filtros.anio!=='all'?'activo':'';
  document.getElementById('fMes').className=filtros.mes!=='all'?'activo':'';
  document.getElementById('fDia').className=filtros.dia!=='all'?'activo':'';
}

function renderChips(){
  const dispImpacto=disponibles('impacto');
  const dispSector=disponibles('sector');
  const dispFactor=disponibles('factor');

  const impactos=['Alto','Medio','Bajo'];
  document.getElementById('chips-impacto').innerHTML=
    '<span class="chip '+(filtros.impacto==='all'?'on-todos':'')+'" onclick="setFiltro(\'impacto\',\'all\')">Todos</span>'+
    impactos.map(v=>{
      const activo=filtros.impacto===v;
      const disponible=dispImpacto.has(v)||activo;
      const cls='chip '+(activo?'on-alto on-medio on-bajo '.split(' ').find(c=>c==='on-'+v.toLowerCase())||'on-active':disponible?'':'disabled');
      const clsFinal='chip '+(activo?'on-'+v.toLowerCase():disponible?'':'disabled');
      return'<span class="'+clsFinal+'"'+(disponible||activo?'onclick="setFiltro(\'impacto\',\''+v+'\')"':'')+'>'+v+'</span>';
    }).join('');

  document.getElementById('chips-sector').innerHTML=
    '<span class="chip '+(filtros.sector==='all'?'on-todos':'')+'" onclick="setFiltro(\'sector\',\'all\')">Todos</span>'+
    SECTORES.map(s=>{
      const activo=filtros.sector===s;
      const disponible=dispSector.has(s)||activo;
      const cls='chip '+(activo?'on-active':disponible?'':'disabled');
      return'<span class="'+cls+'"'+(disponible||activo?'onclick="setFiltroStr(\'sector\',\''+s.replace(/'/g,"\'")+'\')"':'')+'>'+s+'</span>';
    }).join('');

  document.getElementById('chips-factor').innerHTML=
    '<span class="chip '+(filtros.factor==='all'?'on-todos':'')+'" onclick="setFiltro(\'factor\',\'all\')">Todos</span>'+
    FACTORES.map(f=>{
      const activo=filtros.factor===f;
      const disponible=dispFactor.has(f)||activo;
      const cls='chip '+(activo?'on-active':disponible?'':'disabled');
      return'<span class="'+cls+'"'+(disponible||activo?'onclick="setFiltroStr(\'factor\',\''+f+'\')"':'')+'>'+f+'</span>';
    }).join('');

  document.getElementById('chip-prio').className='chip '+(filtros.prio?'on-prio':'');
}

function renderActiveFilters(){
  const tags=[];
  if(filtros.anio!=='all')tags.push({label:'Año: '+filtros.anio,clear:()=>{filtros.anio='all';filtros.mes='all';filtros.dia='all';renderTodo();}});
  if(filtros.mes!=='all')tags.push({label:'Mes: '+MESES[filtros.mes-1],clear:()=>{filtros.mes='all';filtros.dia='all';renderTodo();}});
  if(filtros.dia!=='all')tags.push({label:'Día: '+filtros.dia,clear:()=>{filtros.dia='all';renderTodo();}});
  if(filtros.impacto!=='all')tags.push({label:'Impacto: '+filtros.impacto,clear:()=>{filtros.impacto='all';renderTodo();}});
  if(filtros.sector!=='all')tags.push({label:'Sector: '+filtros.sector,clear:()=>{filtros.sector='all';renderTodo();}});
  if(filtros.factor!=='all')tags.push({label:'Factor: '+filtros.factor,clear:()=>{filtros.factor='all';renderTodo();}});
  if(filtros.prio)tags.push({label:'Prioritarias',clear:()=>{filtros.prio=false;renderTodo();}});
  window._afTags=tags;
  const af=document.getElementById('activeFilters');
  if(tags.length){
    af.innerHTML='<span class="af-label">Activos:</span>'+tags.map((t,i)=>'<span class="af-tag">'+t.label+'<button onclick="clearTag('+i+')">×</button></span>').join('')+'<span class="af-clear" onclick="resetFiltros()">Limpiar todo</span>';
  }else{af.innerHTML='';}
}

function clearTag(i){if(window._afTags&&window._afTags[i])window._afTags[i].clear();}

function renderCards(){
  const vis=filtradas();
  document.getElementById('resultsCount').innerHTML='Mostrando <strong>'+vis.length+'</strong> de <strong>'+noticias.length+'</strong> noticias';
  document.getElementById('newsGrid').innerHTML=vis.length?vis.map(n=>
    '<div class="news-card'+(selected.has(n.id)?' selected':'')+(n.prioritario?' prioritario':'')+'" onclick="toggleSel(\''+n.id+'\')">'+
    '<div class="card-top">'+
    '<div class="card-chk'+(selected.has(n.id)?' on':'')+'"></div>'+
    '<div class="card-header">'+
    '<p class="card-title">'+n.titulo+'</p>'+
    '<div class="card-meta"><span class="card-date">'+fechaStr(n)+'</span><span class="card-sep">·</span><span class="card-fuente">'+( n.fuente||'')+'</span></div>'+
    '</div>'+
    (n.prioritario?'<span class="prio-badge">Prioritario</span>':'')+
    '</div>'+
    '<p class="card-desc">'+n.desc+'</p>'+
    '<div class="card-badges">'+impactoBadge(n.impacto)+(n.sector?'<span class="badge b-tag">'+n.sector+'</span>':'')+(n.factor?'<span class="badge b-tag">'+n.factor+'</span>':'')+
    '</div></div>'
  ).join(''):'<div class="empty">No hay noticias con los filtros seleccionados.</div>';
}

function renderHeader(){
  document.getElementById('selNum').textContent=selected.size;
  document.getElementById('selIndicator').classList.toggle('visible',selected.size>0);
  document.getElementById('btnPdf').classList.toggle('visible',selected.size>0);
}

function impactoBadge(v){
  const m={Alto:'b-alto',Medio:'b-medio',Bajo:'b-bajo'};
  return'<span class="badge '+(m[v]||'b-tag')+'">'+(v||'')+'</span>';
}

function toggleSel(id){if(selected.has(id))selected.delete(id);else selected.add(id);renderCards();renderHeader();}
function abrirModal(){document.getElementById('modalDesc').textContent='Se incluirán '+selected.size+' noticia'+(selected.size!==1?'s':'')+' en el reporte.';document.getElementById('modalStatus').textContent='';document.getElementById('btnGenerar').disabled=false;document.getElementById('modalOverlay').classList.add('open');}
function cerrarModal(){document.getElementById('modalOverlay').classList.remove('open');}

function impactoColorPDF(v){
  if(v==='Alto')return{bg:'rgba(192,57,43,0.12)',color:'#E74C3C',border:'rgba(231,76,60,0.3)'};
  if(v==='Medio')return{bg:'rgba(212,134,26,0.12)',color:'#E67E22',border:'rgba(230,126,34,0.3)'};
  return{bg:'rgba(39,174,96,0.12)',color:'#27AE60',border:'rgba(39,174,96,0.3)'};
}

function generarPDF(){
  const titulo=document.getElementById('pdfTitulo').value||'Reporte de noticias de mayor impacto';
  const autor=document.getElementById('pdfAutor').value||'Equipo editorial';
  const sels=noticias.filter(n=>selected.has(n.id));
  const hoy=new Date().toLocaleDateString('es-EC',{year:'numeric',month:'long',day:'numeric'});
  const conteoI={Alto:0,Medio:0,Bajo:0};
  const conteoS={};
  sels.forEach(n=>{if(n.impacto)conteoI[n.impacto]=(conteoI[n.impacto]||0)+1;if(n.sector)conteoS[n.sector]=(conteoS[n.sector]||0)+1;});

  const filasI=Object.entries(conteoI).filter(([,v])=>v>0).map(([k,v])=>{const c=impactoColorPDF(k);return'<tr><td style="padding:6px 14px"><span style="background:'+c.bg+';color:'+c.color+';border:1px solid '+c.border+';padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">'+k+'</span></td><td style="padding:6px 14px;font-weight:700;text-align:center;color:#fff">'+v+'</td></tr>';}).join('');
  const filasS=Object.entries(conteoS).map(([k,v])=>'<tr><td style="padding:5px 14px;color:rgba(255,255,255,0.7);font-size:12px">'+k+'</td><td style="padding:5px 14px;font-weight:600;text-align:center;color:#fff;font-size:12px">'+v+'</td></tr>').join('');

  const noticiasHTML=sels.map(n=>{
    const c=impactoColorPDF(n.impacto);
    return'<div style="margin-bottom:24px;padding:20px;background:#1a1a1a;border-radius:8px;border-left:'+(n.prioritario?'3px solid #E67E22':'3px solid #2a2a2a')+'">'+
    '<div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
    '<span style="font-size:11px;color:rgba(255,255,255,0.4)">'+fechaStr(n)+(n.fuente?' · '+n.fuente:'')+'</span>'+
    (n.prioritario?'<span style="background:rgba(230,126,34,0.15);color:#E67E22;border:1px solid rgba(230,126,34,0.3);padding:1px 8px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase">Prioritario</span>':'')+
    '</div>'+
    '<p style="font-size:15px;font-weight:700;color:#ffffff;margin-bottom:10px;line-height:1.4">'+n.titulo+'</p>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'+
    '<span style="background:'+c.bg+';color:'+c.color+';border:1px solid '+c.border+';padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600">'+n.impacto+'</span>'+
    (n.sector?'<span style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);padding:2px 10px;border-radius:20px;font-size:11px">'+n.sector+'</span>':'')+
    (n.factor?'<span style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);padding:2px 10px;border-radius:20px;font-size:11px">'+n.factor+'</span>':'')+
    '</div>'+
    '<p style="font-size:13px;color:rgba(255,255,255,0.6);line-height:1.7">'+n.desc+'</p>'+
    '</div>';
  }).join('');

  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+titulo+'</title>'+
  '<style>body{margin:0;padding:0;background:#0A0A0A;font-family:Inter,Arial,sans-serif;color:#fff}@media print{body{background:#0A0A0A;-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style>'+
  '</head><body>'+
  '<div style="max-width:820px;margin:0 auto;padding:0">'+
  '<div style="background:#0A0A0A;border-bottom:1px solid rgba(255,255,255,0.1);padding:28px 40px;display:flex;align-items:center;justify-content:space-between">'+
  '<div>'+
  '<p style="font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:6px">Monitor de Noticias</p>'+
  '<h1 style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">'+titulo+'</h1>'+
  '<p style="font-size:12px;color:rgba(255,255,255,0.4)">'+hoy+' · '+autor+'</p>'+
  '</div>'+
  '</div>'+
  '<div style="padding:32px 40px">'+
  '<div style="display:flex;gap:20px;margin-bottom:32px;flex-wrap:wrap">'+
  '<div style="flex:1;min-width:180px">'+
  '<p style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px">Por impacto</p>'+
  '<table style="width:100%;border-collapse:collapse;background:#141414;border-radius:8px;overflow:hidden"><tbody>'+filasI+'</tbody></table>'+
  '</div>'+
  '<div style="flex:2;min-width:260px">'+
  '<p style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px">Por sector</p>'+
  '<table style="width:100%;border-collapse:collapse;background:#141414;border-radius:8px;overflow:hidden"><tbody>'+filasS+'</tbody></table>'+
  '</div></div>'+
  '<p style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:16px;border-top:1px solid rgba(255,255,255,0.08);padding-top:24px">Noticias seleccionadas</p>'+
  noticiasHTML+
  '<div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:16px;margin-top:8px;text-align:center">'+
  '<p style="font-size:11px;color:rgba(255,255,255,0.2)">Documento confidencial · Keyword · '+hoy+'</p>'+
  '</div></div></div></body></html>';

  cerrarModal();showNotif('Reporte generado','ok');selected.clear();renderCards();renderHeader();
  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);}
}

function showNotif(msg,tipo){const el=document.getElementById('notif');el.textContent=msg;el.className='notif '+tipo;setTimeout(()=>{el.className='notif';},3500);}
cargarNoticias();
</script>
</body>
</html>
