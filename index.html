<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Noticias Económicas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--azul:#0D2B45;--azul-medio:#185FA5;--azul-claro:#E6F1FB;--rojo:#A32D2D;--rojo-claro:#FCEBEB;--ambar:#854F0B;--ambar-claro:#FAEEDA;--verde:#3B6D11;--verde-claro:#EAF3DE;--naranja:#BA7517;--gris:#F7F6F3;--gris-borde:#E5E3DC;--gris-texto:#6B6960;--texto:#1A1916;--blanco:#FFFFFF;--radio:10px;--radio-pill:20px}
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--gris);color:var(--texto);min-height:100vh}
  header{background:var(--azul);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:10px}.logo-icon{width:32px;height:32px;background:var(--azul-medio);border-radius:7px;display:flex;align-items:center;justify-content:center}.logo-icon svg{width:18px;height:18px;fill:white}.logo-text{font-family:'DM Serif Display',serif;font-size:17px;color:white}.logo-sub{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.1em;text-transform:uppercase}
  .header-right{display:flex;align-items:center;gap:12px}.sel-indicator{font-size:12px;color:rgba(255,255,255,0.65);display:none}.sel-indicator.visible{display:block}.sel-indicator span{color:#7EC8E3;font-weight:500}
  .btn-pdf-header{background:var(--azul-medio);color:white;border:none;border-radius:var(--radio);padding:8px 18px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:none}.btn-pdf-header.visible{display:block}.btn-pdf-header:hover{background:#0C447C}
  .main{display:flex;min-height:calc(100vh - 60px)}
  .sidebar{width:265px;flex-shrink:0;background:var(--blanco);border-right:1px solid var(--gris-borde);padding:1.5rem 1.25rem;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
  .sidebar-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--gris-texto);margin-bottom:1rem}
  .filter-group{margin-bottom:1.25rem}.filter-group-label{font-size:11px;font-weight:500;color:var(--gris-texto);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;display:block}
  .chips{display:flex;flex-wrap:wrap;gap:5px}.chip{font-size:12px;padding:4px 11px;border-radius:var(--radio-pill);border:1px solid var(--gris-borde);background:var(--gris);color:var(--gris-texto);cursor:pointer;transition:all .12s;white-space:nowrap}.chip:hover{border-color:#bbb;color:var(--texto)}
  .chip.on-todos{background:var(--azul);color:white;border-color:var(--azul)}.chip.on-alto{background:var(--rojo-claro);color:var(--rojo);border-color:#F09595;font-weight:500}.chip.on-medio{background:var(--ambar-claro);color:var(--ambar);border-color:#EF9F27;font-weight:500}.chip.on-bajo{background:var(--verde-claro);color:var(--verde);border-color:#97C459;font-weight:500}.chip.on-blue{background:var(--azul-claro);color:var(--azul-medio);border-color:#85B7EB;font-weight:500}.chip.on-prio{background:var(--ambar-claro);color:var(--naranja);border-color:#EF9F27;font-weight:500}
  .date-selects{display:flex;flex-direction:column;gap:6px}.date-select-wrap label{font-size:10px;color:var(--gris-texto);display:block;margin-bottom:2px}.date-select-wrap select{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 10px;border-radius:var(--radio);border:1px solid var(--gris-borde);background:var(--gris);color:var(--gris-texto);cursor:pointer;appearance:none}.date-select-wrap select.activo{background:var(--azul-claro);border-color:#85B7EB;color:var(--azul-medio);font-weight:500}
  .reset-btn{width:100%;font-size:12px;padding:7px;border-radius:var(--radio);border:1px solid var(--gris-borde);background:transparent;color:var(--gris-texto);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:.5rem}.reset-btn:hover{background:var(--gris)}.sidebar-divider{border:none;border-top:1px solid var(--gris-borde);margin:1rem 0}
  .content{flex:1;padding:1.5rem 2rem;max-width:900px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}.stat{border-radius:var(--radio);padding:14px 16px;border:1px solid transparent}.stat-alto{background:var(--rojo-claro);border-color:#F09595}.stat-medio{background:var(--ambar-claro);border-color:#EF9F27}.stat-bajo{background:var(--verde-claro);border-color:#97C459}.stat-prio{background:var(--azul-claro);border-color:#85B7EB}
  .stat-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}.stat-alto .stat-label{color:var(--rojo)}.stat-medio .stat-label{color:var(--ambar)}.stat-bajo .stat-label{color:var(--verde)}.stat-prio .stat-label{color:#0C447C}
  .stat-num{font-family:'DM Serif Display',serif;font-size:28px}.stat-alto .stat-num{color:#791F1F}.stat-medio .stat-num{color:#633806}.stat-bajo .stat-num{color:#27500A}.stat-prio .stat-num{color:#042C53}
  .active-filters{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;align-items:center}.af-label{font-size:11px;color:var(--gris-texto)}.af-tag{font-size:11px;padding:3px 10px;border-radius:var(--radio-pill);background:var(--azul-claro);border:1px solid #85B7EB;color:var(--azul-medio);display:flex;align-items:center;gap:5px}.af-tag button{background:none;border:none;cursor:pointer;color:var(--azul-medio);font-size:14px;line-height:1;padding:0}.af-clear{font-size:11px;color:var(--azul-medio);cursor:pointer;text-decoration:underline}
  .results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}.results-count{font-size:13px;color:var(--gris-texto)}.results-count strong{color:var(--texto)}
  .news-card{background:var(--blanco);border:1px solid var(--gris-borde);border-radius:var(--radio);padding:1rem 1.25rem;margin-bottom:10px;cursor:pointer;transition:border-color .12s}.news-card:hover{border-color:#bbb}.news-card.selected{border:1.5px solid var(--azul-medio);background:#F0F7FF}.news-card.prioritario{border-left:3px solid var(--naranja);border-radius:0 var(--radio) var(--radio) 0}.news-card.selected.prioritario{border-left:3px solid var(--naranja);border-top:1.5px solid var(--azul-medio);border-right:1.5px solid var(--azul-medio);border-bottom:1.5px solid var(--azul-medio)}
  .card-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}.card-chk{width:18px;height:18px;border:1.5px solid #ccc;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .12s}.card-chk.on{background:var(--azul-medio);border-color:var(--azul-medio)}.card-chk.on::after{content:'';width:9px;height:5px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translateY(-1px);display:block}
  .card-header{flex:1}.card-title{font-size:14px;font-weight:500;color:var(--texto);line-height:1.4;margin-bottom:4px}.card-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}.card-date{font-size:11px;padding:2px 8px;border-radius:var(--radio-pill);background:var(--gris);border:1px solid var(--gris-borde);color:var(--gris-texto)}.card-fuente{font-size:11px;color:var(--gris-texto)}.prio-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:var(--radio-pill);background:var(--ambar-claro);color:#633806;border:1px solid #EF9F27;flex-shrink:0}
  .card-desc{font-size:13px;color:var(--gris-texto);line-height:1.6;padding-left:28px;margin-bottom:10px}.card-badges{display:flex;gap:5px;flex-wrap:wrap;padding-left:28px}
  .badge{font-size:11px;padding:3px 9px;border-radius:var(--radio-pill);font-weight:500;display:inline-block;white-space:nowrap}.b-alto{background:var(--rojo-claro);color:var(--rojo)}.b-medio{background:var(--ambar-claro);color:var(--ambar)}.b-bajo{background:var(--verde-claro);color:var(--verde)}.b-tag{background:var(--gris);color:var(--gris-texto);border:1px solid var(--gris-borde)}
  .loading,.empty{text-align:center;padding:4rem 2rem;color:var(--gris-texto);font-size:14px}.spinner{width:32px;height:32px;border:2px solid var(--gris-borde);border-top-color:var(--azul-medio);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}@keyframes spin{to{transform:rotate(360deg)}}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:1rem}.modal-overlay.open{display:flex}.modal{background:var(--blanco);border-radius:var(--radio);padding:2rem;width:100%;max-width:460px;border:1px solid var(--gris-borde)}.modal h3{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}.modal p{font-size:13px;color:var(--gris-texto);margin-bottom:1.25rem}.modal-field{margin-bottom:12px}.modal-field label{display:block;font-size:12px;color:var(--gris-texto);margin-bottom:4px}.modal-field input{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;border-radius:var(--radio);border:1px solid var(--gris-borde);background:var(--gris);color:var(--texto)}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}.btn-cancel{font-size:13px;padding:8px 16px;border-radius:var(--radio);border:1px solid var(--gris-borde);background:transparent;cursor:pointer;color:var(--gris-texto);font-family:'DM Sans',sans-serif}.btn-cancel:hover{background:var(--gris)}.btn-generar{font-size:13px;padding:8px 20px;border-radius:var(--radio);border:none;background:var(--azul-medio);color:white;cursor:pointer;font-family:'DM Sans',sans-serif}.btn-generar:hover{background:#0C447C}.btn-generar:disabled{opacity:.5;cursor:not-allowed}.modal-status{font-size:13px;color:var(--gris-texto);margin-top:8px;min-height:20px}
  .notif{position:fixed;bottom:1.5rem;right:1.5rem;font-size:13px;padding:10px 16px;border-radius:var(--radio);z-index:300;display:none}.notif.ok{background:var(--verde-claro);color:var(--verde);border:1px solid #97C459;display:block}.notif.err{background:var(--rojo-claro);color:var(--rojo);border:1px solid #F09595;display:block}
  @media(max-width:768px){.main{flex-direction:column}.sidebar{width:100%;height:auto;position:relative;top:0}.stats{grid-template-columns:repeat(2,1fr)}.content{padding:1rem}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg></div>
    <div><div class="logo-text">Monitor de Noticias</div><div class="logo-sub">Análisis económico</div></div>
  </div>
  <div class="header-right">
    <p class="sel-indicator" id="selIndicator"><span id="selNum">0</span> seleccionadas</p>
    <button class="btn-pdf-header" id="btnPdfHeader" onclick="abrirModal()">Generar PDF</button>
  </div>
</header>
<div class="main">
  <aside class="sidebar">
    <p class="sidebar-title">Filtros</p>
    <div class="filter-group">
      <span class="filter-group-label">Fecha</span>
      <div class="date-selects">
        <div class="date-select-wrap"><label>Año</label><select id="fAnio" onchange="setFecha('anio',this.value)"><option value="all">Todos los años</option></select></div>
        <div class="date-select-wrap"><label>Mes</label><select id="fMes" onchange="setFecha('mes',this.value)"><option value="all">Todos los meses</option></select></div>
        <div class="date-select-wrap"><label>Día</label><select id="fDia" onchange="setFecha('dia',this.value)"><option value="all">Todos los días</option></select></div>
      </div>
    </div>
    <hr class="sidebar-divider">
    <div class="filter-group"><span class="filter-group-label">Impacto</span><div class="chips" id="chips-impacto"></div></div>
    <div class="filter-group"><span class="filter-group-label">Sector</span><div class="chips" id="chips-sector"></div></div>
    <div class="filter-group"><span class="filter-group-label">Factor</span><div class="chips" id="chips-factor"></div></div>
    <hr class="sidebar-divider">
    <div class="filter-group"><div class="chips"><span class="chip" id="chip-prio" onclick="togglePrio()">Solo prioritarias</span></div></div>
    <button class="reset-btn" onclick="resetFiltros()">Limpiar filtros</button>
  </aside>
  <div class="content">
    <div class="stats" id="statsBar"></div>
    <div class="active-filters" id="activeFilters"></div>
    <div class="results-bar"><p class="results-count" id="resultsCount"></p></div>
    <div id="newsGrid"><div class="loading"><div class="spinner"></div>Cargando noticias...</div></div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Generar reporte</h3>
    <p id="modalDesc">Se incluirán las noticias seleccionadas.</p>
    <div class="modal-field"><label>Título del reporte</label><input type="text" id="pdfTitulo" value="Reporte de noticias de mayor impacto"></div>
    <div class="modal-field"><label>Preparado por</label><input type="text" id="pdfAutor" placeholder="Nombre o área..."></div>
    <div class="modal-status" id="modalStatus"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-generar" id="btnGenerar" onclick="generarPDF()">Generar PDF</button>
    </div>
  </div>
</div>
<div class="notif" id="notif"></div>
<script>
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const SECTORES=['Administración pública','Salud y asistencia a la persona','Telecomunicaciones y suministros','Minería y petróleo','Agricultura Ganadería Pesca y Acuicultura','Construcción','Manufactura','Actividades financieras y Seguros','Automotriz','Comercio','Finanzas Públicas','Política Pública','Convenios Internacionales'];
const FACTORES=['Socioeconómico','Ambiental','Legal','Político','Económico','Comercio Exterior','Impuestos','Seguridad'];
let noticias=[],selected=new Set();
let filtros={impacto:'all',sector:'all',factor:'all',prio:false,anio:'all',mes:'all',dia:'all'};

async function cargarNoticias(){
  document.getElementById('newsGrid').innerHTML='<div class="loading"><div class="spinner"></div>Cargando noticias desde Notion...</div>';
  try{
    const res=await fetch('/.netlify/functions/notion');
    if(!res.ok)throw new Error('HTTP '+res.status);
    noticias=await res.json();
    renderTodo();
  }catch(e){
    document.getElementById('newsGrid').innerHTML='<div class="empty">No se pudo conectar con Notion.<br>Intenta recargar la página.</div>';
    console.error(e);
  }
}

function fechaStr(n){if(!n.dia)return'Sin fecha';return`${n.dia} ${MESES[n.mes-1]} ${n.anio}`;}
function fechaISO(n){return n.anio?n.anio*10000+n.mes*100+n.dia:0;}
function setFiltro(k,v){filtros[k]=v;renderTodo();}
function setFiltroStr(k,v){filtros[k]=v;renderTodo();}
function setFecha(k,v){filtros[k]=v==='all'?'all':parseInt(v);if(k==='anio'){filtros.mes='all';filtros.dia='all';}if(k==='mes'){filtros.dia='all';}renderTodo();}
function togglePrio(){filtros.prio=!filtros.prio;renderTodo();}
function resetFiltros(){filtros={impacto:'all',sector:'all',factor:'all',prio:false,anio:'all',mes:'all',dia:'all'};renderTodo();}
function filtradas(){return noticias.filter(n=>{if(filtros.anio!=='all'&&n.anio!=filtros.anio)return false;if(filtros.mes!=='all'&&n.mes!=filtros.mes)return false;if(filtros.dia!=='all'&&n.dia!=filtros.dia)return false;if(filtros.impacto!=='all'&&n.impacto!==filtros.impacto)return false;if(filtros.sector!=='all'&&n.sector!==filtros.sector)return false;if(filtros.factor!=='all'&&n.factor!==filtros.factor)return false;if(filtros.prio&&!n.prioritario)return false;return true;}).sort((a,b)=>fechaISO(b)-fechaISO(a));}
function renderTodo(){renderStats();renderDateFilters();renderChips();renderActiveFilters();renderCards();renderHeader();}
function renderStats(){const alto=noticias.filter(n=>n.impacto==='Alto').length;const medio=noticias.filter(n=>n.impacto==='Medio').length;const bajo=noticias.filter(n=>n.impacto==='Bajo').length;const prios=noticias.filter(n=>n.prioritario).length;document.getElementById('statsBar').innerHTML=`<div class="stat stat-alto"><div class="stat-label">Alto impacto</div><div class="stat-num">${alto}</div></div><div class="stat stat-medio"><div class="stat-label">Medio impacto</div><div class="stat-num">${medio}</div></div><div class="stat stat-bajo"><div class="stat-label">Bajo impacto</div><div class="stat-num">${bajo}</div></div><div class="stat stat-prio"><div class="stat-label">Prioritarias</div><div class="stat-num">${prios}</div></div>`;}
function renderDateFilters(){const anios=[...new Set(noticias.filter(n=>n.anio).map(n=>n.anio))].sort((a,b)=>b-a);const mesesDisp=filtros.anio==='all'?[...new Set(noticias.filter(n=>n.mes).map(n=>n.mes))].sort((a,b)=>a-b):[...new Set(noticias.filter(n=>n.anio==filtros.anio&&n.mes).map(n=>n.mes))].sort((a,b)=>a-b);const diasDisp=(()=>{let s=noticias.filter(n=>n.dia);if(filtros.anio!=='all')s=s.filter(n=>n.anio==filtros.anio);if(filtros.mes!=='all')s=s.filter(n=>n.mes==filtros.mes);return[...new Set(s.map(n=>n.dia))].sort((a,b)=>a-b);})();document.getElementById('fAnio').innerHTML=`<option value="all">Todos los años</option>${anios.map(a=>`<option value="${a}" ${filtros.anio==a?'selected':''}>${a}</option>`).join('')}`;document.getElementById('fMes').innerHTML=`<option value="all">Todos los meses</option>${mesesDisp.map(m=>`<option value="${m}" ${filtros.mes==m?'selected':''}>${MESES[m-1]}</option>`).join('')}`;document.getElementById('fDia').innerHTML=`<option value="all">Todos los días</option>${diasDisp.map(d=>`<option value="${d}" ${filtros.dia==d?'selected':''}>${d}</option>`).join('')}`;document.getElementById('fAnio').className=filtros.anio!=='all'?'activo':'';document.getElementById('fMes').className=filtros.mes!=='all'?'activo':'';document.getElementById('fDia').className=filtros.dia!=='all'?'activo':'';}
function renderChips(){document.getElementById('chips-impacto').innerHTML=`<span class="chip ${filtros.impacto==='all'?'on-todos':''}" onclick="setFiltro('impacto','all')">Todos</span>`+['Alto','Medio','Bajo'].map(v=>`<span class="chip ${filtros.impacto===v?'on-'+v.toLowerCase():''}" onclick="setFiltro('impacto','${v}')">${v}</span>`).join('');document.getElementById('chips-sector').innerHTML=`<span class="chip ${filtros.sector==='all'?'on-blue':''}" onclick="setFiltro('sector','all')">Todos</span>`+SECTORES.map(s=>`<span class="chip ${filtros.sector===s?'on-blue':''}" onclick="setFiltroStr('sector',${JSON.stringify(s)})">${s}</span>`).join('');document.getElementById('chips-factor').innerHTML=`<span class="chip ${filtros.factor==='all'?'on-blue':''}" onclick="setFiltro('factor','all')">Todos</span>`+FACTORES.map(f=>`<span class="chip ${filtros.factor===f?'on-blue':''}" onclick="setFiltroStr('factor',${JSON.stringify(f)})">${f}</span>`).join('');document.getElementById('chip-prio').className='chip '+(filtros.prio?'on-prio':'');}
function renderActiveFilters(){const tags=[];if(filtros.anio!=='all')tags.push({label:`Año: ${filtros.anio}`,clear:()=>{filtros.anio='all';filtros.mes='all';filtros.dia='all';renderTodo();}});if(filtros.mes!=='all')tags.push({label:`Mes: ${MESES[filtros.mes-1]}`,clear:()=>{filtros.mes='all';filtros.dia='all';renderTodo();}});if(filtros.dia!=='all')tags.push({label:`Día: ${filtros.dia}`,clear:()=>{filtros.dia='all';renderTodo();}});if(filtros.impacto!=='all')tags.push({label:`Impacto: ${filtros.impacto}`,clear:()=>{filtros.impacto='all';renderTodo();}});if(filtros.sector!=='all')tags.push({label:`Sector: ${filtros.sector}`,clear:()=>{filtros.sector='all';renderTodo();}});if(filtros.factor!=='all')tags.push({label:`Factor: ${filtros.factor}`,clear:()=>{filtros.factor='all';renderTodo();}});if(filtros.prio)tags.push({label:'Prioritarias',clear:()=>{filtros.prio=false;renderTodo();}});window._afTags=tags;const af=document.getElementById('activeFilters');if(tags.length){af.innerHTML=`<span class="af-label">Filtros activos:</span>${tags.map((t,i)=>`<span class="af-tag">${t.label}<button onclick="clearTag(${i})">×</button></span>`).join('')}<span class="af-clear" onclick="resetFiltros()">Limpiar todo</span>`;}else{af.innerHTML='';}}
function clearTag(i){if(window._afTags&&window._afTags[i])window._afTags[i].clear();}
function renderCards(){const vis=filtradas();document.getElementById('resultsCount').innerHTML=`Mostrando <strong>${vis.length}</strong> de <strong>${noticias.length}</strong> noticias`;document.getElementById('newsGrid').innerHTML=vis.length?vis.map(n=>`<div class="news-card ${selected.has(n.id)?'selected':''} ${n.prioritario?'prioritario':''}" onclick="toggleSel('${n.id}')"><div class="card-top"><div class="card-chk ${selected.has(n.id)?'on':''}"></div><div class="card-header"><p class="card-title">${n.titulo}</p><div class="card-meta"><span class="card-date">${fechaStr(n)}</span><span class="card-fuente">${n.fuente||''}</span></div></div>${n.prioritario?'<span class="prio-badge">Prioritario</span>':''}</div><p class="card-desc">${n.desc}</p><div class="card-badges">${impactoBadge(n.impacto)}${n.sector?`<span class="badge b-tag">${n.sector}</span>`:''}${n.factor?`<span class="badge b-tag">${n.factor}</span>`:''}</div></div>`).join(''):'<div class="empty">No hay noticias con los filtros seleccionados.</div>';}
function renderHeader(){document.getElementById('selNum').textContent=selected.size;document.getElementById('selIndicator').classList.toggle('visible',selected.size>0);document.getElementById('btnPdfHeader').classList.toggle('visible',selected.size>0);}
function impactoBadge(v){const m={Alto:'b-alto',Medio:'b-medio',Bajo:'b-bajo'};return`<span class="badge ${m[v]||'b-tag'}">${v||''}</span>`;}
function toggleSel(id){if(selected.has(id))selected.delete(id);else selected.add(id);renderCards();renderHeader();}
function abrirModal(){document.getElementById('modalDesc').textContent=`Se incluirán ${selected.size} noticia${selected.size!==1?'s':''} en el reporte.`;document.getElementById('modalStatus').textContent='';document.getElementById('btnGenerar').disabled=false;document.getElementById('modalOverlay').classList.add('open');}
function cerrarModal(){document.getElementById('modalOverlay').classList.remove('open');}
async function generarPDF(){
  const titulo=document.getElementById('pdfTitulo').value||'Reporte de noticias';
  const autor=document.getElementById('pdfAutor').value||'Equipo editorial';
  const sels=noticias.filter(n=>selected.has(n.id)).map(n=>({...n,fechaStr:fechaStr(n)}));
  const status=document.getElementById('modalStatus');
  document.getElementById('btnGenerar').disabled=true;
  status.innerHTML='<span style="color:#185FA5">Generando reporte con IA...</span>';
  const hoy=new Date().toLocaleDateString('es-EC',{year:'numeric',month:'long',day:'numeric'});
  const prompt=`Genera un reporte ejecutivo en HTML inline listo para imprimir. Sin DOCTYPE, html, head ni body. Sin backticks. Encabezado: franja azul oscuro #0D2B45 con título "${titulo}" en blanco, subtítulo "Análisis de noticias económicas", fecha "${hoy}", preparado por "${autor}". Resumen ejecutivo: tabla con conteo por nivel de impacto y por sector. Cada noticia: si prioritaria borde izquierdo 3px naranja y badge PRIORITARIO. Fecha en gris 11px. Título bold 15px. Badges impacto coloreados, sector y factor en gris. Descripción 13px. Separador hr. Pie con fecha y confidencialidad. Estilo Georgia títulos Arial cuerpo max-width 820px margin auto. Noticias: ${JSON.stringify(sels)} SOLO HTML.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const html=data.content?.find(b=>b.type==='text')?.text||'';
    if(!html)throw new Error();
    cerrarModal();showNotif('Reporte generado','ok');selected.clear();renderCards();renderHeader();
    const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),800);}
  }catch(e){status.textContent='Error al generar.';document.getElementById('btnGenerar').disabled=false;}
}
function showNotif(msg,tipo){const el=document.getElementById('notif');el.textContent=msg;el.className='notif '+tipo;setTimeout(()=>{el.className='notif';},3500);}
cargarNoticias();
</script>
</body>
</html>
